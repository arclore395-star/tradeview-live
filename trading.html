<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Trading Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0e14;
            --bg-surface: #131920;
            --bg-card: #1a222c;
            --bg-hover: #232d3b;
            --text-primary: #e8edf2;
            --text-secondary: #8899aa;
            --text-muted: #556677;
            --green: #00c853;
            --green-bg: rgba(0,200,83,0.12);
            --red: #ff1744;
            --red-bg: rgba(255,23,68,0.12);
            --blue: #448aff;
            --yellow: #ffd740;
            --border: #253040;
            --font: 'Inter', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font);
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .wrapper { max-width: 1600px; margin: 0 auto; padding: 0 20px; }

        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
        }
        .logo {
            font-family: var(--mono); font-weight: 700; font-size: 1.3rem;
            background: linear-gradient(135deg, var(--green), var(--blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo i { margin-right: 10px; }
        .ticker-tape {
            flex: 1; margin: 0 30px; overflow: hidden; position: relative; height: 28px;
        }
        .ticker-scroll {
            display: flex; gap: 30px; animation: scrollTicker 30s linear infinite;
            white-space: nowrap; position: absolute;
        }
        @keyframes scrollTicker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .ticker-item { display: inline-flex; align-items: center; gap: 8px; font-size: 0.85rem; font-family: var(--mono); }
        .ticker-price { font-weight: 600; }
        .ticker-change { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; }
        .ticker-up { color: var(--green); background: var(--green-bg); }
        .ticker-dn { color: var(--red); background: var(--red-bg); }
        .account-btn {
            display: flex; align-items: center; gap: 10px;
            background: var(--bg-card); border: 1px solid var(--border);
            padding: 8px 18px; border-radius: 10px; cursor: pointer;
            color: var(--text-primary); font-family: var(--font);
            transition: 0.2s;
        }
        .account-btn:hover { background: var(--bg-hover); }

        /* Layout */
        .grid-main {
            display: grid;
            grid-template-columns: 240px 1fr 320px;
            gap: 16px;
            min-height: calc(100vh - 80px);
        }

        /* Left Panel - Portfolio */
        .panel {
            background: var(--bg-surface);
            border-radius: 14px;
            border: 1px solid var(--border);
            padding: 18px;
        }
        .panel-title {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text-muted); margin-bottom: 14px;
        }
        .portfolio-value {
            font-size: 2rem; font-weight: 700; line-height: 1.2;
        }
        .portfolio-change { font-size: 0.85rem; margin-bottom: 16px; }
        .cash-balance {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-top: 1px solid var(--border); font-size: 0.85rem;
        }
        .holding-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(37,48,64,0.5);
            cursor: pointer; transition: 0.15s;
        }
        .holding-item:hover { background: var(--bg-hover); margin: 0 -12px; padding: 10px 12px; border-radius: 8px; }
        .holding-symbol { font-family: var(--mono); font-weight: 600; font-size: 0.85rem; }
        .holding-qty { color: var(--text-secondary); font-size: 0.75rem; }
        .holding-pnl { font-size: 0.8rem; font-family: var(--mono); }

        /* Center - Chart & Order */
        .chart-container { position: relative; height: 380px; }
        .chart-controls {
            display: flex; gap: 8px; margin: 12px 0;
        }
        .chart-btn {
            padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border);
            background: transparent; color: var(--text-secondary); cursor: pointer;
            font-size: 0.75rem; font-family: var(--font); transition: 0.15s;
        }
        .chart-btn:hover { border-color: var(--text-secondary); }
        .chart-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

        .stock-info-bar {
            display: flex; gap: 30px; align-items: center; margin-bottom: 12px;
        }
        .stock-symbol-large {
            font-family: var(--mono); font-size: 1.8rem; font-weight: 700;
        }
        .stock-price-large {
            font-size: 2.2rem; font-weight: 700;
        }
        .stock-change-large { font-size: 1rem; }

        /* Right Panel - Order Book & Trade */
        .order-row {
            display: flex; justify-content: space-between;
            padding: 4px 0; font-family: var(--mono); font-size: 0.8rem;
        }
        .order-bid { color: var(--green); }
        .order-ask { color: var(--red); }
        .order-qty { color: var(--text-muted); }

        .trade-form { margin-top: 16px; }
        .trade-input {
            width: 100%; padding: 10px 14px; background: var(--bg-primary);
            border: 1px solid var(--border); border-radius: 8px; color: #fff;
            font-family: var(--mono); font-size: 1rem; margin: 6px 0;
        }
        .trade-input:focus { border-color: var(--blue); }
        .trade-btns { display: flex; gap: 8px; margin-top: 10px; }
        .btn-buy, .btn-sell {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-weight: 700; font-size: 0.9rem; cursor: pointer;
            font-family: var(--font); transition: 0.2s;
        }
        .btn-buy { background: var(--green); color: #000; }
        .btn-buy:hover { box-shadow: 0 0 20px var(--green-bg); }
        .btn-sell { background: var(--red); color: #fff; }
        .btn-sell:hover { box-shadow: 0 0 20px var(--red-bg); }

        .trade-history { margin-top: 14px; max-height: 180px; overflow-y: auto; }
        .trade-entry {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 0; border-bottom: 1px solid rgba(37,48,64,0.3);
            font-size: 0.78rem;
        }
        .trade-time { color: var(--text-muted); font-family: var(--mono); font-size: 0.7rem; }
        .trade-side-buy { color: var(--green); font-weight: 600; }
        .trade-side-sell { color: var(--red); font-weight: 600; }

        /* Market Overview Strip */
        .market-strip {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
            margin-bottom: 16px;
        }
        .market-card {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: 0.15s;
        }
        .market-card:hover { border-color: var(--text-muted); }
        .market-card .symbol { font-family: var(--mono); font-weight: 600; font-size: 0.85rem; }
        .market-card .name { color: var(--text-muted); font-size: 0.7rem; }
        .market-card .price { font-size: 1.1rem; font-weight: 600; margin: 4px 0; font-family: var(--mono); }
        .market-card .chg { font-size: 0.8rem; font-family: var(--mono); }
        .chg-pos { color: var(--green); }
        .chg-neg { color: var(--red); }

        .watchlist-add {
            display: flex; gap: 8px; margin-top: 12px;
        }
        .watchlist-add input {
            flex: 1; padding: 8px 12px; background: var(--bg-primary);
            border: 1px solid var(--border); border-radius: 6px; color: #fff;
            font-family: var(--mono); text-transform: uppercase;
        }
        .watchlist-add button {
            padding: 8px 16px; background: var(--blue); color: #fff;
            border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
        }

        .green { color: var(--green); }
        .red { color: var(--red); }
        .text-muted { color: var(--text-muted); }

        @media (max-width: 1200px) {
            .grid-main { grid-template-columns: 1fr; }
            .market-strip { grid-template-columns: repeat(3, 1fr); }
            .ticker-tape { display: none; }
        }
        @media (max-width: 600px) {
            .market-strip { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <!-- Header -->
    <div class="header">
        <div class="logo"><i class="fa-solid fa-chart-line"></i> TRADE<span style="color:#fff;-webkit-text-fill-color:unset;">TERM</span></div>
        <div class="ticker-tape" id="tickerTape"></div>
        <div class="account-btn" id="portfolioSummary">
            <i class="fa-solid fa-wallet"></i>
            <span><span id="headerCash">$100,000</span></span>
            <i class="fa-solid fa-chevron-down" style="font-size:0.7rem;color:var(--text-muted)"></i>
        </div>
    </div>

    <!-- Market Strip -->
    <div class="market-strip" id="marketStrip"></div>

    <!-- Main Grid -->
    <div class="grid-main">
        <!-- Left: Portfolio -->
        <div class="panel">
            <div class="panel-title"><i class="fa-solid fa-briefcase"></i> Portfolio</div>
            <div class="portfolio-value" id="portfolioValue">$100,000</div>
            <div class="portfolio-change" id="portfolioChange">+$0.00 (0.00%) today</div>
            <div class="cash-balance"><span>Cash</span><span id="cashBalance">$100,000.00</span></div>
            <div style="margin-top:6px;font-size:0.75rem;color:var(--text-muted);">Holdings</div>
            <div id="holdingsList"></div>
            <div class="watchlist-add">
                <input type="text" id="watchInput" placeholder="Add symbol..." maxlength="5">
                <button onclick="addToWatchlist()"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div style="margin-top:10px;" id="watchlist"></div>
        </div>

        <!-- Center: Chart & Selected Stock -->
        <div class="panel">
            <div class="stock-info-bar">
                <div>
                    <div class="stock-symbol-large" id="selSymbol">AAPL</div>
                    <div class="text-muted" style="font-size:0.8rem;" id="selName">Apple Inc.</div>
                </div>
                <div>
                    <div class="stock-price-large" id="selPrice">$0.00</div>
                    <div class="stock-change-large" id="selChange">+0.00 (0.00%)</div>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
            <div class="chart-controls">
                <button class="chart-btn" data-range="1D">1D</button>
                <button class="chart-btn active" data-range="1W">1W</button>
                <button class="chart-btn" data-range="1M">1M</button>
                <button class="chart-btn" data-range="3M">3M</button>
                <button class="chart-btn" data-range="1Y">1Y</button>
            </div>
        </div>

        <!-- Right: Order Book & Trade -->
        <div class="panel">
            <div class="panel-title"><i class="fa-solid fa-book"></i> Order Book</div>
            <div id="orderBook" style="margin-bottom:14px;"></div>

            <div class="trade-form">
                <div class="panel-title"><i class="fa-solid fa-arrow-right-arrow-left"></i> Trade</div>
                <div style="display:flex;gap:8px;">
                    <input type="number" id="tradeQty" class="trade-input" placeholder="Qty" value="10" min="1">
                </div>
                <div class="trade-btns">
                    <button class="btn-buy" onclick="executeTrade('buy')"><i class="fa-solid fa-arrow-up"></i> Buy</button>
                    <button class="btn-sell" onclick="executeTrade('sell')"><i class="fa-solid fa-arrow-down"></i> Sell</button>
                </div>
            </div>

            <div class="panel-title" style="margin-top:16px;"><i class="fa-solid fa-clock-rotate-left"></i> Trade History</div>
            <div class="trade-history" id="tradeHistory"></div>
        </div>
    </div>
</div>

<script>
// ============================================================
// 1. STOCK DEFINITIONS
// ============================================================
const STOCKS = {
    AAPL: { name: 'Apple Inc.', base: 198.50, color: '#555' },
    MSFT: { name: 'Microsoft Corp.', base: 425.30, color: '#00a4ef' },
    GOOGL: { name: 'Alphabet Inc.', base: 175.80, color: '#34a853' },
    AMZN: { name: 'Amazon.com Inc.', base: 195.20, color: '#ff9900' },
    NVDA: { name: 'NVIDIA Corp.', base: 880.40, color: '#76b900' },
    META: { name: 'Meta Platforms', base: 505.60, color: '#1877f2' },
    TSLA: { name: 'Tesla Inc.', base: 245.30, color: '#e82127' },
    JPM: { name: 'JPMorgan Chase', base: 198.70, color: '#002663' },
    V: { name: 'Visa Inc.', base: 285.40, color: '#1a1f71' },
    JNJ: { name: 'Johnson & Johnson', base: 162.80, color: '#d81e05' },
    WMT: { name: 'Walmart Inc.', base: 175.20, color: '#0071ce' },
    XOM: { name: 'Exxon Mobil', base: 118.60, color: '#fdda24' },
    CRM: { name: 'Salesforce Inc.', base: 305.90, color: '#00a1e0' },
    NFLX: { name: 'Netflix Inc.', base: 625.40, color: '#d81f26' },
    DIS: { name: 'Walt Disney', base: 112.30, color: '#113163' },
};
const TICKERS = Object.keys(STOCKS);

// ============================================================
// 2. STATE
// ============================================================
let prices = {};
let changes = {};
let prevPrices = {};
let portfolio = { cash: 100000, holdings: {} };
let tradeHistory = [];
let selectedSymbol = 'AAPL';
let mainChart = null;
let chartRange = '1W';
let chartHistory = {};
let orderBookData = {};
let watchlist = ['AAPL', 'MSFT', 'NVDA', 'TSLA'];
let tradeCount = 0;

// ============================================================
// 3. PRICE ENGINE (Brownian Motion)
// ============================================================
function gaussianRandom() {
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

function initPrices() {
    TICKERS.forEach(t => {
        prices[t] = STOCKS[t].base;
        prevPrices[t] = STOCKS[t].base;
        changes[t] = 0;
        chartHistory[t] = [];
        orderBookData[t] = generateOrderBook(STOCKS[t].base);
    });
    updateChanges();
}

function generateOrderBook(base) {
    const bids = [], asks = [];
    for (let i = 0; i < 8; i++) {
        const spread = base * 0.001;
        bids.push({ price: base - spread * (i + 1) - (Math.random() * spread * 0.5), qty: Math.floor(Math.random() * 5000 + 100) });
        asks.push({ price: base + spread * (i + 1) + (Math.random() * spread * 0.5), qty: Math.floor(Math.random() * 5000 + 100) });
    }
    return { bids, asks };
}

function updatePrices() {
    TICKERS.forEach(t => {
        prevPrices[t] = prices[t];
        const vol = STOCKS[t].base * 0.002;
        const drift = (Math.random() - 0.49) * 0.0005;
        prices[t] = prices[t] * (1 + drift + gaussianRandom() * 0.003);
        prices[t] = Math.max(prices[t], STOCKS[t].base * 0.7);
        changes[t] = ((prices[t] - prevPrices[t]) / prevPrices[t]) * 100;
        // Update order book
        orderBookData[t] = generateOrderBook(prices[t]);
        // Chart history
        if (chartHistory[t]) {
            chartHistory[t].push({ time: Date.now(), price: prices[t] });
        }
    });
    updateChanges();
}

function updateChanges() {
    TICKERS.forEach(t => {
        const orig = STOCKS[t].base;
        changes[t] = ((prices[t] - orig) / orig) * 100;
    });
}

// ============================================================
// 4. UI RENDER
// ============================================================
function renderMarketStrip() {
    const strip = document.getElementById('marketStrip');
    strip.innerHTML = TICKERS.map(t => {
        const p = prices[t], ch = changes[t];
        const cls = ch >= 0 ? 'chg-pos' : 'chg-neg';
        const sign = ch >= 0 ? '+' : '';
        return `<div class="market-card" onclick="selectStock('${t}')">
            <div class="symbol">${t}</div>
            <div class="name">${STOCKS[t].name}</div>
            <div class="price">$${p.toFixed(2)}</div>
            <div class="chg ${cls}">${sign}${ch.toFixed(2)}%</div>
        </div>`;
    }).join('');
}

function renderTicker() {
    const tape = document.getElementById('tickerTape');
    const items = TICKERS.map(t => {
        const ch = changes[t];
        const cls = ch >= 0 ? 'ticker-up' : 'ticker-dn';
        const sign = ch >= 0 ? '+' : '';
        return `<span class="ticker-item">
            <strong>${t}</strong>
            <span class="ticker-price">$${prices[t].toFixed(2)}</span>
            <span class="ticker-change ${cls}">${sign}${ch.toFixed(2)}%</span>
        </span>`;
    }).join('');
    // Duplicate for seamless scroll
    tape.innerHTML = `<div class="ticker-scroll">${items}${items}</div>`;
}

function renderPortfolio() {
    const totalHoldingsVal = Object.entries(portfolio.holdings).reduce((sum, [sym, qty]) => {
        return sum + (prices[sym] || 0) * qty;
    }, 0);
    const totalValue = portfolio.cash + totalHoldingsVal;
    const origValue = 100000;
    const dayChange = totalValue - origValue;
    const dayChangePct = (dayChange / origValue) * 100;
    const sign = dayChange >= 0 ? '+' : '';

    document.getElementById('portfolioValue').textContent = `$${totalValue.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
    document.getElementById('portfolioChange').textContent = `${sign}$${dayChange.toFixed(2)} (${sign}${dayChangePct.toFixed(2)}%) today`;
    document.getElementById('portfolioChange').className = `portfolio-change ${dayChange >= 0 ? 'green' : 'red'}`;
    document.getElementById('cashBalance').textContent = `$${portfolio.cash.toFixed(2)}`;
    document.getElementById('headerCash').textContent = `$${totalValue.toLocaleString(undefined, {maximumFractionDigits:0})}`;

    const list = document.getElementById('holdingsList');
    const entries = Object.entries(portfolio.holdings).filter(([,q]) => q > 0);
    if (entries.length === 0) {
        list.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;padding:10px 0;">No holdings yet</div>';
    } else {
        list.innerHTML = entries.map(([sym, qty]) => {
            const val = prices[sym] * qty;
            const avgCost = portfolio.holdings[sym + '_cost'] || prices[sym];
            const pnl = (prices[sym] - avgCost) * qty;
            const pnlCls = pnl >= 0 ? 'green' : 'red';
            const pnlSign = pnl >= 0 ? '+' : '';
            return `<div class="holding-item" onclick="selectStock('${sym}')">
                <div>
                    <div class="holding-symbol">${sym}</div>
                    <div class="holding-qty">${qty} shares</div>
                </div>
                <div>
                    <div>$${val.toFixed(2)}</div>
                    <div class="holding-pnl ${pnlCls}">${pnlSign}$${pnl.toFixed(2)}</div>
                </div>
            </div>`;
        }).join('');
    }
}

function renderStockInfo() {
    const t = selectedSymbol;
    document.getElementById('selSymbol').textContent = t;
    document.getElementById('selName').textContent = STOCKS[t]?.name || t;
    const p = prices[t], ch = changes[t];
    const cls = ch >= 0 ? 'green' : 'red';
    const sign = ch >= 0 ? '+' : '';
    document.getElementById('selPrice').textContent = `$${p.toFixed(2)}`;
    document.getElementById('selPrice').className = `stock-price-large ${cls}`;
    document.getElementById('selChange').textContent = `${sign}$${(p - STOCKS[t].base).toFixed(2)} (${sign}${ch.toFixed(2)}%)`;
    document.getElementById('selChange').className = `stock-change-large ${cls}`;
}

function renderOrderBook() {
    const t = selectedSymbol;
    const ob = orderBookData[t];
    if (!ob) return;
    const container = document.getElementById('orderBook');
    let html = '<div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-muted);margin-bottom:6px;">';
    html += '<span>Bids</span><span>Amount</span></div>';
    ob.bids.forEach(b => {
        html += `<div class="order-row"><span class="order-bid">$${b.price.toFixed(2)}</span><span class="order-qty">${b.qty.toLocaleString()}</span></div>`;
    });
    html += '<div style="border-top:1px solid var(--border);margin:8px 0;"></div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--text-muted);margin-bottom:6px;">';
    html += '<span>Asks</span><span>Amount</span></div>';
    ob.asks.forEach(a => {
        html += `<div class="order-row"><span class="order-ask">$${a.price.toFixed(2)}</span><span class="order-qty">${a.qty.toLocaleString()}</span></div>`;
    });
    container.innerHTML = html;
}

function renderTradeHistory() {
    const container = document.getElementById('tradeHistory');
    if (tradeHistory.length === 0) {
        container.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;padding:8px 0;">No trades yet</div>';
        return;
    }
    container.innerHTML = tradeHistory.slice().reverse().map(t => {
        const sideCls = t.side === 'buy' ? 'trade-side-buy' : 'trade-side-sell';
        const sign = t.side === 'buy' ? '+' : '-';
        return `<div class="trade-entry">
            <div>
                <span class="${sideCls}">${t.side.toUpperCase()}</span>
                <strong>${t.symbol}</strong>
                <span class="text-muted">${t.qty} @ $${t.price.toFixed(2)}</span>
            </div>
            <div style="text-align:right;">
                <div style="font-weight:600;">${sign}$${(t.qty * t.price).toFixed(2)}</div>
                <div class="trade-time">${t.time}</div>
            </div>
        </div>`;
    }).join('');
}

function renderWatchlist() {
    const container = document.getElementById('watchlist');
    if (watchlist.length === 0) {
        container.innerHTML = '<div style="color:var(--text-muted);font-size:0.78rem;">Watchlist empty</div>';
        return;
    }
    container.innerHTML = watchlist.map(sym => {
        const p = prices[sym], ch = changes[sym];
        const cls = ch >= 0 ? 'green' : 'red';
        const sign = ch >= 0 ? '+' : '';
        return `<div class="holding-item" onclick="selectStock('${sym}')" style="padding:6px 0;">
            <div>
                <div class="holding-symbol">${sym}</div>
            </div>
            <div style="text-align:right;">
                <div style="font-family:var(--mono);font-size:0.85rem;">$${p.toFixed(2)}</div>
                <div class="${cls}" style="font-size:0.75rem;">${sign}${ch.toFixed(2)}%</div>
            </div>
        </div>`;
    }).join('');
}

// ============================================================
// 5. CHART
// ============================================================
function updateChart() {
    const t = selectedSymbol;
    const data = chartHistory[t] || [];
    const canvas = document.getElementById('mainChart').getContext('2d');

    let points;
    switch(chartRange) {
        case '1D': points = data.slice(-78); break;  // ~6.5 hrs at 5min
        case '1W': points = data.slice(-390); break;
        case '1M': points = data.slice(-780); break;
        case '3M': points = data.slice(-1560); break;
        case '1Y': points = data.slice(-3120); break;
        default: points = data.slice(-390);
    }

    if (!points || points.length < 2) {
        if (mainChart) mainChart.destroy();
        mainChart = new Chart(canvas, {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: { responsive: true, maintainAspectRatio: false }
        });
        return;
    }

    const labels = points.map((_, i) => i);
    const prices_arr = points.map(p => p.price);
    const isUp = prices_arr[prices_arr.length - 1] >= prices_arr[0];
    const color = isUp ? '#00c853' : '#ff1744';

    if (mainChart) mainChart.destroy();
    mainChart = new Chart(canvas, {
        type: 'line',
        data: {
            labels,
            datasets: [{
                data: prices_arr,
                borderColor: color,
                backgroundColor: isUp ? 'rgba(0,200,83,0.08)' : 'rgba(255,23,68,0.08)',
                fill: true,
                tension: 0.3,
                pointRadius: 0,
                borderWidth: 2,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { enabled: true, mode: 'index', intersect: false } },
            scales: {
                x: { display: false },
                y: {
                    ticks: { color: '#556677', font: { size: 11 }, callback: v => '$' + v.toFixed(2) },
                    grid: { color: 'rgba(37,48,64,0.4)' }
                }
            },
            interaction: { mode: 'nearest', intersect: false }
        }
    });
}

// ============================================================
// 6. ACTIONS
// ============================================================
function selectStock(sym) {
    if (!STOCKS[sym]) return;
    selectedSymbol = sym;
    renderStockInfo();
    renderOrderBook();
    updateChart();
}

function executeTrade(side) {
    const sym = selectedSymbol;
    const qty = parseInt(document.getElementById('tradeQty').value);
    if (!qty || qty <= 0) { alert('Enter a valid quantity'); return; }
    const price = prices[sym];
    const cost = price * qty;

    if (side === 'buy') {
        if (cost > portfolio.cash) { alert('Insufficient cash!'); return; }
        portfolio.cash -= cost;
        portfolio.holdings[sym] = (portfolio.holdings[sym] || 0) + qty;
        // Track avg cost
        const prevQty = portfolio.holdings[sym] - qty;
        const prevCost = portfolio.holdings[sym + '_cost'] || price;
        if (prevQty <= 0) {
            portfolio.holdings[sym + '_cost'] = price;
        } else {
            portfolio.holdings[sym + '_cost'] = ((prevCost * prevQty) + (price * qty)) / (prevQty + qty);
        }
    } else {
        const held = portfolio.holdings[sym] || 0;
        if (qty > held) { alert('Not enough shares!'); return; }
        portfolio.cash += cost;
        portfolio.holdings[sym] = held - qty;
        if (portfolio.holdings[sym] <= 0) {
            delete portfolio.holdings[sym];
            delete portfolio.holdings[sym + '_cost'];
        }
    }

    const now = new Date();
    const timeStr = now.toLocaleTimeString();
    tradeHistory.push({ side, symbol: sym, qty, price, time: timeStr });
    tradeCount++;

    renderPortfolio();
    renderTradeHistory();
    const action = side === 'buy' ? 'Bought' : 'Sell';
    showToast(`${action} ${qty} ${sym} @ $${price.toFixed(2)}`, side === 'buy' ? 'arrow-up' : 'arrow-down');
}

function addToWatchlist() {
    const input = document.getElementById('watchInput');
    const sym = input.value.trim().toUpperCase();
    if (!sym) return;
    if (!STOCKS[sym]) { alert('Unknown symbol'); return; }
    if (watchlist.includes(sym)) { alert('Already in watchlist'); return; }
    watchlist.push(sym);
    renderWatchlist();
    input.value = '';
}

// ============================================================
// 7. TOAST SYSTEM
// ============================================================
function showToast(msg, icon) {
    const existing = document.querySelector('.toast-container');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast-container';
    toast.style.cssText = `
        position:fixed;bottom:30px;right:30px;z-index:9999;
        background:var(--bg-surface);border:1px solid var(--blue);
        padding:16px 24px;border-radius:12px;color:#fff;
        font-family:var(--font);font-size:0.9rem;
        box-shadow:0 10px 40px rgba(0,0,0,0.5);
        display:flex;align-items:center;gap:12px;
        animation:slideUp 0.3s ease;
    `;
    toast.innerHTML = `<i class="fa-solid fa-${icon}" style="color:var(--blue)"></i> ${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = '0.3s'; setTimeout(() => toast.remove(), 300); }, 2500);
}

// Add keyframe for toast
const styleSheet = document.createElement('style');
styleSheet.textContent = `@keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }`;
document.head.appendChild(styleSheet);

// ============================================================
// 8. MAIN LOOP
// ============================================================
function tick() {
    updatePrices();
    renderMarketStrip();
    renderTicker();
    renderPortfolio();
    renderStockInfo();
    renderOrderBook();
    renderWatchlist();
    if (selectedSymbol) updateChart();
}

// ============================================================
// 9. CHART RANGE
// ============================================================
document.querySelectorAll('.chart-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        chartRange = this.dataset.range;
        updateChart();
    });
});

// ============================================================
// 10. INIT
// ============================================================
initPrices();
// Fill initial chart history
for (let i = 0; i < 500; i++) {
    TICKERS.forEach(t => {
        const vol = STOCKS[t].base * 0.002;
        const drift = (Math.random() - 0.49) * 0.0005;
        const p = i === 0 ? STOCKS[t].base : chartHistory[t][i - 1].price;
        const newP = p * (1 + drift + gaussianRandom() * 0.003);
        chartHistory[t].push({ time: Date.now() - (500 - i) * 60000, price: Math.max(newP, STOCKS[t].base * 0.7) });
    });
}
// Set final prices
TICKERS.forEach(t => {
    prices[t] = chartHistory[t][chartHistory[t].length - 1].price;
    changes[t] = ((prices[t] - STOCKS[t].base) / STOCKS[t].base) * 100;
});

renderMarketStrip();
renderTicker();
renderPortfolio();
renderStockInfo();
renderOrderBook();
renderTradeHistory();
renderWatchlist();
updateChart();
showToast('Terminal Online — Markets Streaming', 'circle-check');

// Real-time loop (every 1.2s)
setInterval(tick, 1200);

// Also push new history points periodically
setInterval(() => {
    TICKERS.forEach(t => {
        if (chartHistory[t]) {
            if (chartHistory[t].length > 5000) chartHistory[t].splice(0, 1000);
        }
    });
}, 30000);
</script>
