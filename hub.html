<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔷 Roblox — Play</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Segoe UI',sans-serif;overflow:hidden;user-select:none;}
canvas{display:block;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;color:#fff;}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px;color:rgba(255,255,255,0.15);font-family:monospace;}
#topBar{position:absolute;top:0;left:0;width:100%;height:46px;background:linear-gradient(180deg,rgba(0,0,0,0.75),transparent);display:flex;align-items:center;gap:10px;padding:0 16px;z-index:25;}
#topBar .logo{font-weight:800;font-size:15px;letter-spacing:0.5px;text-shadow:0 2px 8px rgba(0,0,0,0.6);}
#topBar .logo b{color:#0af;}
#topBar .sep{width:1px;height:18px;background:rgba(255,255,255,0.1);}
#topBar .gname{font-size:12px;color:rgba(255,255,255,0.45);}
#topBar .stats{margin-left:auto;display:flex;gap:16px;font-size:12px;color:rgba(255,255,255,0.35);}
#topBar .stats .v{color:#0f0;font-weight:700;}
#topBar .stats .vm{color:#fc0;font-weight:700;}
#hudC{position:absolute;top:44%;left:50%;transform:translate(-50%,-60px);text-align:center;pointer-events:none;transition:opacity 0.25s;}
#hudC .t{font-size:30px;font-weight:800;text-shadow:0 2px 24px rgba(0,0,0,0.7);margin-bottom:2px;line-height:1.2;}
#hudC .s{font-size:13px;color:rgba(255,255,255,0.4);}
#hudC .c{font-size:48px;font-weight:800;color:#0af;text-shadow:0 2px 24px rgba(0,0,0,0.4);}
#hbOuter{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);width:220px;height:6px;background:rgba(0,0,0,0.5);border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);}
#hbFill{height:100%;background:linear-gradient(90deg,#4f4,#8f4,#4f4);background-size:200% 100%;border-radius:3px;transition:width 0.2s;animation:hbPulse 2s infinite;}
@keyframes hbPulse{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
#interact{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);padding:10px 22px;border-radius:8px;border:1px solid rgba(255,255,255,0.08);font-size:13px;display:none;white-space:nowrap;letter-spacing:0.3px;}
#interact .k{color:#0af;font-weight:700;}
#gmOver{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:30;backdrop-filter:blur(14px);align-items:center;justify-content:center;flex-direction:column;}
#gmOver .t{font-size:54px;font-weight:800;margin-bottom:4px;text-shadow:0 0 60px rgba(0,170,255,0.25);}
#gmOver .s{font-size:15px;color:rgba(255,255,255,0.35);margin-bottom:28px;}
#gmOver .btns{display:flex;gap:10px;}
#gmOver button{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);color:#fff;padding:10px 28px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;pointer-events:auto;transition:0.15s;letter-spacing:0.3px;}
#gmOver button:hover{background:rgba(0,170,255,0.18);border-color:#0af;transform:scale(1.06);}
#menu{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:40;align-items:center;justify-content:center;flex-direction:column;}
#menu .t{font-size:38px;font-weight:800;margin-bottom:2px;text-shadow:0 0 60px rgba(0,170,255,0.2);}
#menu .st{font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:28px;}
#menu .gs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:520px;}
#menu .gs .c{background:rgba(255,255,255,0.035);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px 18px;cursor:pointer;transition:0.2s;text-align:center;min-width:100px;pointer-events:auto;}
#menu .gs .c:hover{background:rgba(0,170,255,0.1);border-color:#0af;transform:translateY(-3px);}
#menu .gs .c .ic{font-size:26px;margin-bottom:3px;}
#menu .gs .c .nm{font-size:10px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:0.5px;}
#menu .ht{color:rgba(255,255,255,0.15);font-size:11px;margin-top:20px;letter-spacing:0.5px;}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0b0e1a;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#0af;transition:opacity 0.8s;font-family:'Segoe UI',sans-serif;}
#loading .lg{font-size:72px;margin-bottom:2px;animation:lgP 1.6s infinite;}
@keyframes lgP{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
#loading h1{font-size:34px;font-weight:800;letter-spacing:4px;text-shadow:0 0 60px rgba(0,170,255,0.2);}
#loading .sb{font-size:10px;color:rgba(255,255,255,0.2);margin-top:3px;letter-spacing:2px;text-transform:uppercase;}
#loading .br{width:340px;height:2px;background:rgba(0,170,255,0.08);border-radius:2px;margin-top:28px;overflow:hidden;}
#loading .br-in{width:0%;height:100%;background:linear-gradient(90deg,#0af,#4df);transition:width 0.3s;}
</style>
</head>
<body>
<div id="loading">
  <div class="lg">🔷</div>
  <h1>ROBLOX</h1>
  <div class="sb">Loading experiences...</div>
  <div class="br"><div class="br-in" id="loadBar"></div></div>
</div>
<div id="ui" style="display:none;">
  <div id="topBar">
    <div class="logo">🔷 <b>Roblox</b></div>
    <div class="sep"></div>
    <div class="gname" id="gameName">Hub</div>
    <div class="stats">
      <span>$<span class="vm" id="moneyDisp">0</span></span>
      <span>❤️ <span class="v" id="hpDisp">100</span></span>
    </div>
  </div>
  <div id="hudC"><div class="t" id="hudTitle">HUB</div><div class="s" id="hudSub">Explore!</div></div>
  <div id="crosshair">+</div>
  <div id="hbOuter"><div id="hbFill" style="width:100%"></div></div>
  <div id="interact">Press <span class="k">E</span> <span id="interactTxt">to interact</span></div>
</div>
<div id="menu">
  <div class="t">🎮 Games</div>
  <div class="st">Choose an experience</div>
  <div class="gs" id="gameList"></div>
  <div class="ht">M = menu &nbsp;·&nbsp; Shift = sprint &nbsp;·&nbsp; E = interact</div>
</div>
<div id="gmOver">
  <div class="t" id="goTitle">GAME OVER</div>
  <div class="s" id="goSub"></div>
  <div class="btns">
    <button onclick="showMenu()">Play Again</button>
    <button onclick="showMenu()">Back to Hub</button>
  </div>
</div>
<script>
// ══ CONSTANTS ════════════════════════════════════════════════
const G=-40,MS=16,JF=14;
const _v=new THREE.Vector3(),_q=new THREE.Quaternion();
THREE.Object3D.prototype.addTo=function(p){p.add(this);return this;};
// ══ STATE ════════════════════════════════════════════════════
let mode='hub',isLocked=false,dt=0,health=100,shakeA=0,landT=0;
const K={};
const P={x:0,y:3,z:0,vx:0,vy:0,vz:0,onGround:false,yaw:0,pitch:0,money:0,lastGround:false};
// ══ SCENE ══════════════════════════════════════════════════════
const S=new THREE.Scene();
S.background=new THREE.Color(0x5bb8e8);
S.fog=new THREE.Fog(0x5bb8e8,60,160);
const C=new THREE.PerspectiveCamera(68,innerWidth/innerHeight,0.1,400);
const R=new THREE.WebGLRenderer({antialias:true});
R.setSize(innerWidth,innerHeight);
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.shadowMap.enabled=true;
R.shadowMap.type=THREE.PCFSoftShadowMap;
R.toneMapping=THREE.ACESFilmicToneMapping;
R.toneMappingExposure=1.1;
document.body.prepend(R.domElement);
const A=new THREE.AmbientLight(0x88bbdd,0.4);
S.add(A);
const U=new THREE.DirectionalLight(0xffeedd,1.7);
U.position.set(60,120,50);U.castShadow=true;
U.shadow.mapSize.width=2048;U.shadow.mapSize.height=2048;
U.shadow.camera.near=1;U.shadow.camera.far=250;
U.shadow.camera.left=-120;U.shadow.camera.right=120;
U.shadow.camera.top=120;U.shadow.camera.bottom=-120;
S.add(U);
const H2=new THREE.HemisphereLight(0x87ceeb,0x6b4423,0.3);
S.add(H2);
// ══ AUDIO ════════════════════════════════════════════════════
let ac=null;
function initAudio(){if(!ac)ac=new (window.AudioContext||window.webkitAudioContext)();}
function sfx(f,d,t='square',v=0.06){
  if(!ac)return;
  const o=ac.createOscillator(),g=ac.createGain();
  o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);
  g.gain.setValueAtTime(v,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
  o.connect(g);g.connect(ac.destination);
  o.start();o.stop(ac.currentTime+d);
}
function sfxJump(){sfx(280,0.08,'square',0.04);}
function sfxLand(){sfx(120,0.06,'sine',0.04);}
function sfxCoin(){
  sfx(660,0.06,'square',0.04);
  setTimeout(()=>sfx(990,0.08,'square',0.04),70);
}
function sfxBuy(){sfx(440,0.1,'square',0.04);setTimeout(()=>sfx(660,0.1,'square',0.04),80);}
function sfxHurt(){sfx(180,0.15,'sawtooth',0.03);setTimeout(()=>sfx(120,0.2,'sawtooth',0.02),100);}
function sfxWin(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>sfx(f,0.12,'square',0.04),i*90));
}
function sfxClick(){sfx(800,0.03,'square',0.02);}
// ══ HELPERS ══════════════════════════════════════════════════
const RC=new THREE.Raycaster();
function bx(w,h,d,c,o={}){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:c,roughness:0.35,metalness:0,...o}));m.castShadow=true;m.receiveShadow=true;return m;}
function pl(w,d,c,y=.5){const m=bx(w,.5,d,c);m.position.y=y;return m;}
function cy(r,h,c,o={}){const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,14),new THREE.MeshStandardMaterial({color:c,roughness:0.35,metalness:0,...o}));m.castShadow=true;return m;}
function sp(r,c,o={}){const m=new THREE.Mesh(new THREE.SphereGeometry(r,14,14),new THREE.MeshStandardMaterial({color:c,roughness:0.35,metalness:0,...o}));m.castShadow=true;return m;}
function ct(t,w=128,h=32,c='#fff',s=15){
  const ca=document.createElement('canvas');ca.width=w;ca.height=h;
  const ctx=ca.getContext('2d');
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle=c;ctx.font=`bold ${s}px Inter,monospace`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(t,w/2,h/2);
  return new THREE.CanvasTexture(ca);
}
function lb(t,c,s=14,w=160){const m=new THREE.Mesh(new THREE.PlaneGeometry(w/40,28/40),new THREE.MeshBasicMaterial({map:ct(t,w,28,c,s),transparent:true,side:THREE.DoubleSide}));return m;}
// ══ TERRAIN ══════════════════════════════════════════════════
function makeTerrain(w,d,c,opts={}){
  const seg=40;
  const geo=new THREE.PlaneGeometry(w,d,seg,seg).rotateX(-Math.PI/2);
  const pos=geo.attributes.position;
  const hMap=opts.hills||false;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i),dist=Math.sqrt(x*x+z*z);
    let y=0;
    if(hMap&&dist>15&&dist<w*0.4){y=Math.sin(x*0.06)*Math.cos(z*0.05)*1.2+Math.sin(x*0.03+z*0.04)*0.6;}
    pos.setY(i,y);
  }pos.needsUpdate=true;geo.computeVertexNormals();
  const m=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:c,roughness:0.6,metalness:0,...opts.mat||{}}));
  m.receiveShadow=true;return m;
}
// ══ CLOUDS ═══════════════════════════════════════════════════
function mkCloud(g,cx,cy,cz){
  const cl=new THREE.Group();
  const rs=[1.5,1.1,1.7,0.9,1.3];
  rs.forEach((r,i)=>{const p=sp(r,0xffffff,{transparent:true,opacity:0.45});p.position.set((i-2)*1.6,Math.sin(i)*0.3,(i%3-1)*0.5);cl.add(p);});
  cl.position.set(cx,cy,cz);g.add(cl);
}
// ══ PARTICLES ════════════════════════════════════════════════
let particles=[],rainDrops=[];
function spawnParticles(x,y,z,color,count,opts={}){
  for(let i=0;i<count;i++){
    const sz=opts.size||0.12+Math.random()*0.15;
    const p=sp(sz,color,{transparent:true,opacity:0.7});
    p.position.set(x+(Math.random()-0.5)*2,y+Math.random(),z+(Math.random()-0.5)*2);
    p.userData={vy:2+Math.random()*5,vx:(Math.random()-0.5)*4,vz:(Math.random()-0.5)*4,life:1+Math.random()*0.5};
    S.add(p);particles.push(p);
  }
}
function spawnCoinFX(x,y,z){
  for(let i=0;i<6;i++){
    const p=sp(0.12,0xffcc00,{emissive:0xffcc00,emissiveIntensity:0.5,transparent:true,opacity:0.9});
    const a=i*1.05;const r=1.5;
    p.position.set(x+Math.sin(a)*r,y+0.5,z+Math.cos(a)*r);
    p.userData={vy:3+Math.random()*2,vx:Math.sin(a)*2,vz:Math.cos(a)*2,life:1};
    S.add(p);particles.push(p);
  }
}
function spawnRain(count){
  for(let i=0;i<count;i++){
    const r=bx(0.04,0.8,0.04,0x4499ff,{transparent:true,opacity:0.2});
    r.position.set((Math.random()-0.5)*50,20+Math.random()*15,(Math.random()-0.5)*50);
    S.add(r);rainDrops.push(r);
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i],ud=p.userData;
    ud.vy-=28*dt;p.position.y+=ud.vy*dt;
    if(ud.vx!==undefined){p.position.x+=ud.vx*dt;p.position.z+=ud.vz*dt;ud.vx*=0.98;ud.vz*=0.98;}
    ud.life-=dt*1.8;
    p.material.opacity=Math.max(0,ud.life);
    p.scale.setScalar(0.3+ud.life*0.7);
    if(ud.life<=0){S.remove(p);particles.splice(i,1);}
  }
  rainDrops.forEach(r=>{r.position.y-=28*dt;if(r.position.y<-2){r.position.y=20+Math.random()*15;r.position.x=(Math.random()-0.5)*50;r.position.z=(Math.random()-0.5)*50;}});
}
// ══ CHARACTER ════════════════════════════════════════════════
const ROBLOX_BODY={
  headColor:0xf0c8a0,torsoColor:0x44aa44,armColor:0xf0c8a0,legColor:0x224488
};
function makeCharacter(){
  const g=new THREE.Group(),bc=ROBLOX_BODY;
  // Head with face texture
  const head=bx(1.2,1.2,1.2,bc.headColor);head.position.y=3.2;g.add(head);
  // Canvas face - high quality Roblox style
  const ca=document.createElement('canvas');ca.width=64;ca.height=64;
  const cx=ca.getContext('2d');
  // Skin base
  cx.fillStyle='#f0c8a0';cx.fillRect(0,0,64,64);
  // Eyes - large round
  cx.fillStyle='#222';
  cx.beginPath();cx.ellipse(18,26,7,9,0,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.ellipse(46,26,7,9,0,0,Math.PI*2);cx.fill();
  // Eye shine
  cx.fillStyle='rgba(255,255,255,0.3)';
  cx.beginPath();cx.arc(19,24,2,0,Math.PI*2);cx.fill();
  cx.beginPath();cx.arc(47,24,2,0,Math.PI*2);cx.fill();
  // Smile - iconic curved U
  cx.strokeStyle='#222';cx.lineWidth=2.5;cx.lineCap='round';
  cx.beginPath();cx.arc(32,34,16,0.12,Math.PI-0.12);cx.stroke();
  // Eyebrows
  cx.fillStyle='#222';cx.fillRect(8,12,16,3);cx.fillRect(40,12,16,3);
  // Cheek blush
  cx.fillStyle='rgba(255,150,150,0.2)';cx.beginPath();cx.arc(12,38,5,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(52,38,5,0,Math.PI*2);cx.fill();
  const faceTex=new THREE.CanvasTexture(ca);
  new THREE.Mesh(new THREE.PlaneGeometry(1,1),new THREE.MeshBasicMaterial({map:faceTex,transparent:true})).translate(0,3.2,.61).addTo(g);
  new THREE.Mesh(new THREE.PlaneGeometry(1,1),new THREE.MeshBasicMaterial({color:bc.headColor})).translate(0,3.2,-.61).addTo(g);
  // Torso with subtle shirt stripe
  const tors=bx(1.4,1.6,0.8,bc.torsoColor);tors.position.y=1.8;g.add(tors);
  const stripe=bx(1.41,0.08,0.81,0xffffff,{transparent:true,opacity:0.08});stripe.position.y=1.4;g.add(stripe);
  // Arms
  const la=bx(0.4,1.4,0.4,bc.armColor);la.position.set(-1,2.5,0);g.add(la);
  const ra=bx(0.4,1.4,0.4,bc.armColor);ra.position.set(1,2.5,0);g.add(ra);
  // Legs
  const ll=bx(0.5,1.2,0.5,bc.legColor);ll.position.set(-0.4,0.6,0);g.add(ll);
  const rl=bx(0.5,1.2,0.5,bc.legColor);rl.position.set(0.4,0.6,0);g.add(rl);
  g.userData={la,ra,ll,rl,bob:0};
  return g;
}
let character=null;
function spawnCharacter(x,y,z){
  if(character)S.remove(character);
  character=makeCharacter();
  character.position.set(x,y,z);
  S.add(character);
}
function animCharacter(){
  if(!character)return;
  const spd=Math.sqrt(P.vx*P.vx+P.vz*P.vz),t=Date.now()*0.013;
  const sw=spd>0.5?Math.sin(t)*0.45:0;
  const armSwing=spd>0.5?sw:0;
  if(character.userData) {
    const {la,ra,ll,rl}=character.userData;
    if(la){la.rotation.x=armSwing;ra.rotation.x=-armSwing;}
    if(ll){ll.rotation.x=-armSwing*0.65;rl.rotation.x=armSwing*0.65;}
  }
}
// ══ COLLISION ═════════════════════════════════════════════════
function getGroup(){
  const m={hub,disaster,obby,speed,tycoon,dr:dr,am,rp,pk};
  return m[mode]||null;
}
function checkGround(){
  const grp=getGroup();
  if(!grp)return false;
  _v.set(P.x,P.y+0.5,P.z);
  RC.set(_v,new THREE.Vector3(0,-1,0));
  RC.far=P.vy*dt<0?Math.min(2,Math.abs(P.vy*dt)+0.6):0.5;
  const ms=[];
  grp.traverse(c=>{if(c.isMesh&&c.geometry.type==='BoxGeometry'&&c.material.opacity>=0.3&&c.position.y>0.1){ms.push(c);}});
  if(ms.length===0)return false;
  const hits=RC.intersectObjects(ms);
  for(const h of hits){
    if(h.distance>0.05&&h.distance<2){
      const ny=h.point.y+0.5;
      if(ny>P.y||Math.abs(ny-P.y)<0.3){P.y=ny;P.vy=0;return true;}
    }
  }
  return false;
}
// ══ HUB ══════════════════════════════════════════════════════
let hub=null;
const GAMES=[
  {id:'disaster',name:'Natural\nDisaster',icon:'🌊',color:'#44aaff'},
  {id:'obby',name:'Tower\nof Hell',icon:'🏗️',color:'#ff6644'},
  {id:'speedrun',name:'Speed\nRun',icon:'⚡',color:'#44ff44'},
  {id:'tycoon',name:'Theme\nPark',icon:'🏪',color:'#ffcc00'},
  {id:'deathrun',name:'Death\nRun',icon:'☠️',color:'#ff4444'},
  {id:'simulator',name:'Adopt\nMe!',icon:'🐾',color:'#ff88ff'},
  {id:'roleplay',name:'Role\nPlay',icon:'🏘️',color:'#4488ff'},
  {id:'parkour',name:'Park\nour',icon:'🧗',color:'#44ffcc'},
];
function buildHub(){
  const g=new THREE.Group();
  // Terrain with rolling hills
  g.add(makeTerrain(200,200,0x6da83a,{hills:true}));
  // Path tiles radiating from center
  const pm=new THREE.MeshStandardMaterial({color:0xc49a6c,roughness:0.8,metalness:0});
  for(let i=-4;i<=4;i++){const p=new THREE.Mesh(new THREE.PlaneGeometry(2.5,2).rotateX(-Math.PI/2),pm);p.position.set(i*7,0.12,0);g.add(p);}
  for(let i=-4;i<=4;i++){const p=new THREE.Mesh(new THREE.PlaneGeometry(2,2.5).rotateX(-Math.PI/2),pm);p.position.set(0,0.12,i*7);g.add(p);}
  // Spawn platform
  const spPl=cy(7,1.2,0xdddddd,{roughness:0.5});spPl.position.y=0.6;spPl.receiveShadow=true;g.add(spPl);
  const spRim=cy(7.2,0.15,0xffffff,{transparent:true,opacity:0.15});spRim.position.y=1.2;g.add(spRim);
  // Floating orb
  const orb=sp(1.8,0x0af,{roughness:0.1,metalness:0.4,emissive:0x0af,emissiveIntensity:0.2});

      disaster.children.forEach(c=>{if(c.isMesh&&c.geometry.type==='BoxGeometry'&&c.position.y>1){c.position.x+=(Math.random()-0.5)*2;c.position.z+=(Math.random()-0.5)*2;}});

    // Windows with glow
    [-2.8,2.8].forEach(wx=>{bx(1,1,0.12,0x4488ff,{transparent:true,opacity:0.35,emissive:0x4488ff,emissiveIntensity:0.1}).translate(hx+wx,2.5,hz+4).addTo(g);});
    // Chimney
    bx(1,2,1,0x884422).translate(hx+3.2,5.5,hz-2).addTo(g);
    // Lamp post at each house
    cy(0.12,3,0x777777).translate(hx-5,1.5,hz-5).addTo(g);
    sp(0.35,0xffcc00,{emissive:0xffcc00,emissiveIntensity:0.3}).translate(hx-5,4.5,hz-5).addTo(g);
  });
  // Clouds
  for(let i=0;i<5;i++)mkCloud(g,(Math.random()-0.5)*50,13,(Math.random()-0.5)*50);
  g.userData.spawn={x:0,y:1,z:14};
  return g;
}
function initRP(){
  clearAll();rp=buildRP();S.add(rp);
  const sp=rp.userData.spawn;P.x=sp.x;P.y=sp.y;P.z=sp.z;P.vx=P.vy=P.vz=0;
  mode='roleplay';
  document.getElementById('gameName').textContent='RolePlay Town';
  setHud('🏘️ RolePlay Town','Explore!');spawnCharacter(P.x,P.y,P.z);
}
function updateRP(){document.getElementById('hudSub').textContent=`$${Math.floor(P.money).toLocaleString()}`;}
// ══ PARKOUR ═══════════════════════════════════════════════════
let pk=null,pkW=false;
function buildPK(){
  const g=new THREE.Group();
  const pit=new THREE.Mesh(new THREE.PlaneGeometry(200,30).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0x444488,transparent:true,opacity:0.08}));
  pit.position.y=-0.1;g.add(pit);
  [-8,8].forEach(z=>{bx(200,5,0.4,0x4488ff,{transparent:true,opacity:0.04}).translate(0,2.5,z).addTo(g);});
  for(let i=0;i<25;i++){
    const w=2+Math.random()*3|0,d=2+Math.random()*3|0,h=0.8+i*0.22;
    const c=new THREE.Color().setHSL(i*0.04,0.65,0.48);
    bx(w,h,d,c).translate(-i*7,h/2,(Math.random()-0.5)*4).addTo(g);
    bx(w+0.1,0.06,d+0.1,0xffffff,{transparent:true,opacity:0.1}).translate(-i*7,h+0.03,(Math.random()-0.5)*4).addTo(g);
  }
  bx(14,0.4,8,0x00ff44,{transparent:true,opacity:0.35}).translate(-175,7.5,0).addTo(g);
  g.userData.spawn={x:0,y:1,z:0};
  return g;
}
function initPK(){
  clearAll();pk=buildPK();S.add(pk);
  const sp=pk.userData.spawn;P.x=sp.x;P.y=sp.y;P.z=sp.z;P.vx=P.vy=P.vz=0;
  mode='parkour';pkW=false;
  document.getElementById('gameName').textContent='Parkour';
  setHud('🧗 Parkour','Reach the end!');spawnCharacter(P.x,P.y,P.z);
}
function updatePK(){
  if(!pk)return;
  if(P.y<-5){const sp=pk.userData.spawn;P.x=sp.x;P.y=sp.y;P.z=sp.z;P.vx=P.vy=P.vz=0;sfxHurt();}
  if(P.x<-174&&Math.abs(P.z)<5&&!pkW){pkW=true;sfxWin();spawnCoinFX(P.x,P.y+2,P.z);endGame('🎉 Parkour Complete!','Course mastered!',800);}
  document.getElementById('hudSub').textContent=`Height ${P.y.toFixed(1)}m · ${Math.min(25,Math.floor(-P.x/7)+1)}/25`;
}
// ══ MANAGEMENT ═════════════════════════════════════════════════
function clearAll(){
  particles.forEach(p=>{try{S.remove(p)}catch(e){}});particles=[];
  rainDrops.forEach(r=>{try{S.remove(r)}catch(e){}});rainDrops=[];
  S.children.filter(c=>c.name==='flood').forEach(c=>S.remove(c));
  [hub,obby,disaster,speed,tycoon,dr,am,rp,pk].forEach(g=>{try{S.remove(g)}catch(e){}});
  if(character)S.remove(character);
  amPets.forEach(p=>{try{if(!p.col)S.remove(p.m);S.remove(p.eye1);S.remove(p.eye2)}catch(e){}});amPets=[];
  hub=obby=disaster=speed=tycoon=dr=am=rp=pk=null;
  interactTarget=null;
}
function setHud(t,s){document.getElementById('hudTitle').textContent=t;document.getElementById('hudSub').textContent=s;}
function endGame(t,s,m){
  P.money+=m||0;
  document.getElementById('goTitle').textContent=t;
  document.getElementById('goSub').innerHTML=s+(m?`<br>+$${m}`:'')+`<br><span style="font-size:11px;color:rgba(255,255,255,0.2)">Total: $${Math.floor(P.money).toLocaleString()}</span>`;
  document.getElementById('gmOver').style.display='flex';
  if(m)spawnCoinFX(P.x,P.y+2,P.z);
}
function showMenu(){
  document.getElementById('gmOver').style.display='none';
  document.getElementById('menu').style.display='flex';
  document.getElementById('hudTitle').textContent='MENU';
  sfxClick();
}
function playGame(id){
  document.getElementById('menu').style.display='none';
  sfxClick();
  document.body.click();
  if(id==='disaster'){initDisaster();return;}
  if(id==='obby'){initObby();return;}
  if(id==='speedrun'){initSpeed();return;}
  if(id==='tycoon'){initTycoon();return;}
  if(id==='deathrun'){initDR();return;}
  if(id==='simulator'){initAM();return;}
  if(id==='roleplay'){initRP();return;}
  if(id==='parkour'){initPK();return;}
  initHub();
}
// ══ PLAYER ════════════════════════════════════════════════════
function updatePlayer(){
  let mx=0,mz=0;
  if(K['w']||K['arrowup'])mz-=1;
  if(K['s']||K['arrowdown'])mz+=1;
  if(K['a']||K['arrowleft'])mx-=1;
  if(K['d']||K['arrowright'])mx+=1;
  const l=Math.sqrt(mx*mx+mz*mz);
  if(l>0){mx/=l;mz/=l;}
  const spd=K['shift']?MS*1.5:MS;
  const rm=mx*Math.cos(P.yaw)-mz*Math.sin(P.yaw);
  const rz=mx*Math.sin(P.yaw)+mz*Math.cos(P.yaw);
  P.vx=rm*spd;P.vz=rz*spd;
  P.vy+=G*dt;
  P.x+=P.vx*dt;P.z+=P.vz*dt;
  // Land detection
  const wasGround=P.onGround;
  const onG=checkGround();
  if(onG){
    if(!wasGround&&P.vy<-5){sfxLand();spawnParticles(P.x,P.y-0.3,P.z,0xaaaaaa,3,{size:0.08});}
    P.onGround=true;P.vy=0;
  }else{
    P.y+=P.vy*dt;
    if(P.y<-20){P.y=-20;P.vy=0;}
    P.onGround=false;
  }
  if((K[' ']||K['space'])&&P.onGround&&isLocked){P.vy=JF;P.onGround=false;K[' ']=false;K['space']=false;sfxJump();}
  // Camera shake decay
  if(shakeA>0){
    C.position.x+=Math.sin(Date.now()*0.05)*shakeA*0.25;
    C.position.y+=Math.cos(Date.now()*0.07)*shakeA*0.2;
    shakeA*=0.96;if(shakeA<0.001)shakeA=0;
  }
}
// ══ CAMERA ════════════════════════════════════════════════════
function updateCam(){
  C.position.set(P.x,P.y+1.6,P.z);
  C.quaternion.setFromEuler(new THREE.Euler(P.pitch,P.yaw,0,'YXZ'));
}
// ══ INTERACT ══════════════════════════════════════════════════
let interactTarget=null;
function checkInteract(){
  const ie=document.getElementById('interact');
  interactTarget=null;
  if(mode==='hub'&&hub){
    RC.setFromCamera({x:0,y:0},C);
    const hits=RC.intersectObjects(hub.children,true);
    let found=null;
    for(const h2 of hits){
      for(const p of hub.userData.portals||[]){
        if(Math.sqrt((h2.point.x-p.x)**2+(h2.point.z-p.z)**2)<6&&Math.abs(h2.point.y-p.y)<5){found=p;break;}
      }if(found)break;
    }
    if(found){
      ie.style.display='block';
      document.getElementById('interactTxt').textContent=`E · ${found.game.toUpperCase()}`;
      if(K['e']){K['e']=false;sfxClick();playGame(found.game);}
    }else{ie.style.display='none';}
  }else if(mode==='tycoon'&&tycoon){
    RC.setFromCamera({x:0,y:0},C);
    const hits=RC.intersectObjects(tycoon.children);
    let found=null;
    for(const h2 of hits){
      for(const s of tycoon.userData.rides||[]){
        if(Math.abs(h2.object.position.x-s.x)<3&&Math.abs(h2.object.position.z-s.z)<3&&!s.owned&&P.money>=s.cost){found=s;break;}
      }if(found)break;
    }
    if(found){
      ie.style.display='block';
      document.getElementById('interactTxt').textContent=`E · Buy ${found.name} $${found.cost.toLocaleString()}`;
      interactTarget={type:'tycoon_ride',idx:found.i};
      if(K['e']){K['e']=false;P.money-=found.cost;found.owned=true;
        tycoon.children.forEach(c=>{if(c.position.x===found.x&&c.position.z===found.z&&c.isMesh&&c.geometry.type==='BoxGeometry'&&c.position.y===0.4)c.material.color.setHex(0x44aa44);});
        spawnCoinFX(found.x,2,found.z);sfxBuy();
        ie.style.display='none';
      }
    }else{ie.style.display='none';}
  }else{ie.style.display='none';}
}
// ══ CONTROLS ══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  K[e.key.toLowerCase()]=true;
  if(e.key===' '&&isLocked)e.preventDefault();
  if(e.key==='Escape'&&isLocked)document.exitPointerLock();
  if(e.key==='m'||e.key==='M')showMenu();
  if(e.key==='e'||e.key==='E')initAudio();
});
document.addEventListener('keyup',e=>{K[e.key.toLowerCase()]=false;});
R.domElement.addEventListener('click',()=>{if(!isLocked&&document.getElementById('menu').style.display!=='flex'){initAudio();R.domElement.requestPointerLock();}});
document.addEventListener('pointerlockchange',()=>{isLocked=!!document.pointerLockElement;});
document.addEventListener('mousemove',e=>{if(!isLocked)return;P.yaw-=e.movementX*0.003;P.pitch-=e.movementY*0.003;P.pitch=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,P.pitch));});
// ══ UI ════════════════════════════════════════════════════════
(function(){
  const gl=document.getElementById('gameList');
  GAMES.forEach(g=>{
    const card=document.createElement('div');card.className='c';
    card.innerHTML=`<div class="ic">${g.icon}</div><div class="nm">${g.name.replace('\n',' ')}</div>`;
    card.addEventListener('click',()=>playGame(g.id));
    gl.appendChild(card);
  });
})();
// ══ MAIN ══════════════════════════════════════════════════════
let fc=0,fl=0,lt=0;
function anim(t){
  requestAnimationFrame(anim);
  dt=Math.min((t-(lt||t))/1000,0.05);lt=t;
  updatePlayer();updateCam();animCharacter();updateParticles();
  if(mode==='disaster'){updateDisaster();updateRain();}
  else if(mode==='obby')updateObby();
  else if(mode==='speedrun')updateSpeed();
  else if(mode==='tycoon')updateTycoon();
  else if(mode==='deathrun')updateDR();
  else if(mode==='simulator')updateAM();
  else if(mode==='roleplay')updateRP();
  else if(mode==='parkour')updatePK();
  if(character)character.position.set(P.x,P.y,P.z);
  document.getElementById('moneyDisp').textContent=Math.floor(P.money).toLocaleString();
  checkInteract();
  R.render(S,C);
  fc++;if(t-fl>1000){fc=0;fl=t;}
}
// ══ RESIZE ══════════════════════════════════════════════════════
window.addEventListener('resize',()=>{C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});
// ══ LOAD ═══════════════════════════════════════════════════════
let lp=0;
const li=setInterval(()=>{
  lp+=Math.random()*15+5;
  if(lp>=100){lp=100;clearInterval(li);
    document.getElementById('loadBar').style.width='100%';
    setTimeout(()=>{document.getElementById('loading').style.opacity='0';
      setTimeout(()=>{document.getElementById('loading').style.display='none';
        document.getElementById('ui').style.display='block';
        initHub();anim(0);},800);},400);
  }
  document.getElementById('loadBar').style.width=lp+'%';
},150);
</script>
