<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>J.A.R.V.I.S — AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060a14;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;color:#fff;height:100vh;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto;padding:0 20px}
header{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04);flex-shrink:0}
header .logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#0af,#4df);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .model-badge{font-size:10px;color:rgba(255,255,255,.15);margin-left:auto;padding:4px 10px;border:1px solid rgba(255,255,255,.06);border-radius:6px}
header .model-badge span{color:rgba(255,255,255,.35)}
#keyBtn{background:none;border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.25);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px;transition:.2s}
#keyBtn:hover{border-color:#0af;color:#0af}
#msgs{flex:1;overflow-y:auto;padding:12px 0;scroll-behavior:smooth;min-height:0}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
.msg{display:flex;gap:10px;margin-bottom:12px;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg .av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;margin-top:2px}
.msg.user .av{background:rgba(0,170,255,.12);color:#0af}
.msg.ai .av{background:rgba(255,255,255,.05);color:rgba(255,255,255,.3)}
.msg .b{padding:10px 14px;border-radius:10px;line-height:1.65;font-size:14px;color:rgba(255,255,255,.82);word-break:break-word;max-width:88%}
.msg.user .b{background:rgba(0,170,255,.06);border:1px solid rgba(0,170,255,.07)}
.msg.ai .b{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04)}
.msg .b p{margin:4px 0}
.msg .b code{padding:1px 5px;border-radius:4px;background:rgba(0,0,0,.3);font-size:13px;font-family:'Cascadia Code','JetBrains Mono',monospace}
.msg .b pre{background:rgba(0,0,0,.3);padding:12px;border-radius:8px;overflow-x:auto;margin:6px 0;font-size:13px;border:1px solid rgba(255,255,255,.03)}
.msg .b pre code{background:none;padding:0}
.msg .b ul,.msg .b ol{padding-left:20px;margin:4px 0}
.msg .b blockquote{border-left:2px solid rgba(0,170,255,.3);padding-left:12px;margin:6px 0;color:rgba(255,255,255,.5)}
.typing .b::after{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:#0af;margin-left:6px;animation:dot 1s infinite}
@keyframes dot{0%,100%{opacity:.2}50%{opacity:1}}
#inputArea{display:flex;gap:8px;padding:12px 0 20px;flex-shrink:0}
#inp{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:11px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:.2s;resize:none;max-height:100px}
#inp:focus{border-color:rgba(0,170,255,.25);background:rgba(255,255,255,.06)}
#inp::placeholder{color:rgba(255,255,255,.12)}
.btn{width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:rgba(255,255,255,.25);cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.btn:hover{border-color:#0af;color:#0af;background:rgba(0,170,255,.06)}
#sendBtn{background:#0af;color:#fff;border-color:transparent;font-size:13px}
#sendBtn:hover{background:#0cf;border-color:transparent;color:#fff}
#sendBtn:disabled{opacity:.25;cursor:not-allowed}
#voiceBtn.active{background:rgba(255,68,68,.12);border-color:#f44;color:#f44;animation:pulse 1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 rgba(255,68,68,0)}50%{box-shadow:0 0 14px rgba(255,68,68,.12)}100%{box-shadow:0 0 0 rgba(255,68,68,0)}}
#keyOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);backdrop-filter:blur(10px);z-index:100;align-items:center;justify-content:center}
#keyOverlay.show{display:flex}
#keyPanel{background:#0c1122;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:28px;max-width:400px;width:90%}
#keyPanel h2{font-size:17px;margin-bottom:6px;color:rgba(255,255,255,.8)}
#keyPanel p{font-size:12px;color:rgba(255,255,255,.25);margin-bottom:16px;line-height:1.6}
#keyPanel input{width:100%;padding:10px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:8px;color:#fff;font-size:13px;outline:none;font-family:monospace}
#keyPanel input:focus{border-color:rgba(0,170,255,.3)}
#keyPanel .row{display:flex;gap:8px;margin-top:14px}
#keyPanel .row button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:12px;transition:.2s}
#keyPanel .save{background:#0af;color:#fff;flex:1}
#keyPanel .save:hover{background:#0cf}
#keyPanel .skip{background:rgba(255,255,255,.04);color:rgba(255,255,255,.3)}
#keyPanel .skip:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5)}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);backdrop-filter:blur(10px);padding:8px 18px;border-radius:8px;font-size:12px;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.06);z-index:60;display:none;white-space:nowrap}
@media(max-width:600px){#app{padding:0 12px}.msg .b{font-size:13px;padding:8px 12px}#inp{font-size:13px}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">J.A.R.V.I.S</div>
    <div class="model-badge"><span id="modelLabel">GPT-4o</span></div>
    <button id="keyBtn">🔑 Key</button>
  </header>
  <div id="msgs">
    <div class="msg ai"><div class="av">●</div><div class="b">Hello, I'm J.A.R.V.I.S. Ask me anything.</div></div>
  </div>
  <div id="inputArea">
    <textarea id="inp" rows="1" placeholder="Ask anything..." style="height:42px"></textarea>
    <button class="btn" id="voiceBtn" title="Voice input">🎤</button>
    <button class="btn" id="sendBtn" title="Send">➤</button>
  </div>
</div>
<div id="keyOverlay">
  <div id="keyPanel">
    <h2>🔑 OpenAI API Key</h2>
    <p>Enter your OpenAI API key to enable AI responses.<br>Your key stays on this device only.<br><a href="https://platform.openai.com/api-keys" target="_blank" style="color:#0af">Get a key →</a></p>
    <input type="text" id="keyInput" placeholder="sk-..." autocomplete="off" spellcheck="false">
    <div class="row">
      <button class="skip" onclick="closeKeyPanel()">Use demo mode</button>
      <button class="save" onclick="saveKey()">Save</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
const $$=id=>document.getElementById(id)
const S={key:localStorage.getItem('j_key')||'',model:'gpt-4o',msgs:[],processing:false,listening:false,synth:window.speechSynthesis,rec:null}
const msgs=$$('msgs'),inp=$$('inp')

// Init
if(!S.key)setTimeout(()=>$$('keyOverlay').classList.add('show'),400)
$$('modelLabel').textContent=S.model

function saveKey(){
  S.key=$$('keyInput').value.trim()
  localStorage.setItem('j_key',S.key)
  closeKeyPanel()
  if(S.key)toast('Key saved')
  else{demoMode();toast('Demo mode — responses are simulated')}
}
function closeKeyPanel(){$$('keyOverlay').classList.remove('show')}
function demoMode(){closeKeyPanel()}

function addMsg(role,content,streaming){
  S.msgs.push({role,content})
  renderMsg(role,content,streaming)
  msgs.scrollTop=msgs.scrollHeight
}
function renderMsg(role,content,streaming){
  const d=document.createElement('div')
  d.className='msg '+role+(streaming?' typing':'')
  d.innerHTML=`<div class="av">${role==='user'?'▸':'●'}</div><div class="b"></div>`
  msgs.appendChild(d)
  if(!streaming)d.querySelector('.b').innerHTML=marked.parse(content)
  return d
}
function streamMsg(el,text){
  const b=el.querySelector('.b')
  b.innerHTML=marked.parse(text)
  msgs.scrollTop=msgs.scrollHeight
}
function removeTyping(){
  const t=msgs.querySelector('.typing')
  if(t)t.classList.remove('typing')
}

async function send(){
  const text=inp.value.trim()
  if(!text||S.processing)return
  inp.value='';inp.style.height='42px'
  S.processing=true;$$('sendBtn').disabled=true
  addMsg('user',text)
  const aiEl=addMsg('ai','',true)
  try{
    const reply=await askAI(text,aiEl)
    removeTyping()
    addMsg('ai',reply)
    if(S.synth&&localStorage.getItem('j_voice')!=='false')speak(reply)
  }catch(e){
    removeTyping()
    addMsg('ai','Error: '+e.message)
  }
  S.processing=false;$$('sendBtn').disabled=false
}

async function askAI(text,aiEl){
  if(!S.key)return demoReply(text)
  const msgsPayload=[{role:'system',content:'You are J.A.R.V.I.S, an AI assistant. Respond conversationally, thoroughly, and use markdown when helpful.'}]
  const recent=S.msgs.slice(-12)
  recent.forEach(m=>msgsPayload.push({role:m.role,content:m.content}))
  msgsPayload.push({role:'user',content:text})
  try{
    const resp=await fetch('https://api.openai.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.key},
      body:JSON.stringify({model:S.model,messages:msgsPayload,max_tokens:4096,stream:true})
    })
    if(!resp.ok){const e=await resp.text();throw new Error(`API ${resp.status}: ${e}`)}
    const reader=resp.body.getReader()
    const dec=new TextDecoder()
    let full='',buffer=''
    while(true){
      const {done,value}=await reader.read()
      if(done)break
      buffer+=dec.decode(value,{stream:true})
      const lines=buffer.split('\n')
      buffer=lines.pop()||''
      for(const line of lines){
        const m=line.match(/^data: (.+)$/)
        if(!m)continue
        if(m[1]==='[DONE]')break
        try{
          const d=JSON.parse(m[1])
          const c=d.choices[0]?.delta?.content||''
          full+=c
          streamMsg(aiEl,full)
        }catch(e){}
      }
    }
    return full
  }catch(e){
    if(aiEl.parentNode)removeTyping()
    throw e
  }
}

function demoReply(text){
  const t=text.toLowerCase()
  const r=t.includes('time')?`It's ${new Date().toLocaleTimeString()}.`:
    t.includes('date')?`Today is ${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}.`:
    t.includes('hello')||t.includes('hi')||t.includes('hey')?'Hello! How can I help you today?':
    t.includes('who are you')?"I'm J.A.R.V.I.S, your AI assistant.":
    t.includes('joke')?['Why did the scarecrow win an award? Because he was outstanding in his field!','What do you call a fake noodle? An impasta!','Why don\'t scientists trust atoms? Because they make up everything!'][Math.floor(Math.random()*3)]:
    `I understand you're asking about "${text}". To get real AI responses, please set up your OpenAI API key using the Key button above.`
  return new Promise(res=>setTimeout(()=>res(r),500+Math.random()*800))
}

function startVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition
  if(!SR){toast('Voice not supported');return}
  if(S.listening){stopVoice();return}
  const r=new SR();r.lang='en-US';r.interimResults=true;r.continuous=false
  S.rec=r
  r.onresult=e=>{
    let f=''
    for(let i=e.resultIndex;i<e.results.length;i++)if(e.results[i].isFinal)f+=e.results[i][0].transcript
    if(f){inp.value+=f;inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px'}
  }
  r.onerror=e=>{if(e.error!='aborted'&&e.error!='no-speech')toast('Voice: '+e.error);S.listening=false;$$('voiceBtn').classList.remove('active')}
  r.onend=()=>{S.listening=false;$$('voiceBtn').classList.remove('active')}
  r.start();S.listening=true;$$('voiceBtn').classList.add('active');toast('Listening...')
}
function stopVoice(){if(S.rec){try{S.rec.stop()}catch(e){}S.rec=null}S.listening=false;$$('voiceBtn').classList.remove('active')}
function speak(t){if(S.synth.speaking)S.synth.cancel();const u=new SpeechSynthesisUtterance(t.replace(/<[^>]*>/g,''));u.rate=.92;S.synth.speak(u)}
function toast(m){const t=$$('toast');t.textContent=m;t.style.display='block';clearTimeout(window.tt);window.tt=setTimeout(()=>t.style.display='none',2500)}

$$('sendBtn').addEventListener('click',send)
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}})
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,100)+'px'})
$$('voiceBtn').addEventListener('click',()=>S.listening?stopVoice():startVoice())
$$('keyBtn').addEventListener('click',()=>{$$('keyInput').value=S.key;$$('keyOverlay').classList.toggle('show')})
$$('keyOverlay').addEventListener('click',e=>{if(e.target===$$('keyOverlay'))closeKeyPanel()})
</script>
</body>
</html>
