<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔷 Roblox — Play</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Inter','Segoe UI',sans-serif;overflow:hidden;user-select:none;}
canvas{display:block;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;color:#fff;font-family:'Fredoka','Inter',sans-serif;}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;color:rgba(255,255,255,0.25);font-family:monospace;transition:opacity 0.2s;}
#topBar{position:absolute;top:0;left:0;width:100%;height:44px;background:linear-gradient(180deg,rgba(0,0,0,0.7),transparent);display:flex;align-items:center;gap:8px;padding:0 14px;z-index:25;}
#topBar .logo{font-weight:700;font-size:15px;color:#fff;text-shadow:0 0 10px rgba(0,0,0,0.5);}
#topBar .logo span{color:#0af;}
#topBar .sep{width:1px;height:22px;background:rgba(255,255,255,0.12);}
#topBar .gameName{font-size:13px;color:rgba(255,255,255,0.6);}
#topBar .stats{margin-left:auto;display:flex;gap:14px;font-size:12px;color:rgba(255,255,255,0.4);}
#topBar .stats .val{color:#0f0;font-weight:600;}
#topBar .stats .val.m{color:#ffcc00;}
#hudCenter{position:absolute;top:45%;left:50%;transform:translate(-50%,-80px);text-align:center;pointer-events:none;transition:opacity 0.3s;}
#hudCenter .big{font-size:32px;font-weight:700;color:#fff;text-shadow:0 2px 30px rgba(0,0,0,0.6);margin-bottom:4px;}
#hudCenter .sub{font-size:14px;color:rgba(255,255,255,0.45);}
#hudCenter .counter{font-size:52px;font-weight:700;color:#0af;text-shadow:0 2px 30px rgba(0,0,0,0.3);}
#healthBar{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:220px;height:8px;background:rgba(0,0,0,0.5);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);}
#healthBar .fill{height:100%;background:linear-gradient(90deg,#44ff44,#88ff44,#44ff44);background-size:200% 100%;border-radius:4px;transition:width 0.25s;animation:pulse 2s infinite;}
@keyframes pulse{0%{background-position:0%}50%{background-position:100%}100%{background-position:0%}}
#interact{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);backdrop-filter:blur(12px);padding:10px 24px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);font-size:13px;display:none;white-space:nowrap;}
#interact .key{color:#0af;font-weight:700;}
#toast{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);padding:8px 20px;border-radius:6px;font-size:13px;border:1px solid rgba(255,255,255,0.08);opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
#gameOver{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.65);z-index:30;backdrop-filter:blur(12px);align-items:center;justify-content:center;flex-direction:column;}
#gameOver .big{font-size:52px;font-weight:700;margin-bottom:6px;text-shadow:0 0 50px rgba(0,170,255,0.3);}
#gameOver .sm{font-size:16px;color:rgba(255,255,255,0.4);margin-bottom:24px;}
#gameOver .btns{display:flex;gap:10px;}
#gameOver button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;padding:10px 28px;border-radius:6px;cursor:pointer;font-size:14px;font-family:inherit;pointer-events:auto;transition:0.15s;}
#gameOver button:hover{background:rgba(0,170,255,0.2);border-color:#0af;transform:scale(1.05);}
#menu{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:40;align-items:center;justify-content:center;flex-direction:column;}
#menu .title{font-size:40px;font-weight:700;margin-bottom:2px;text-shadow:0 0 60px rgba(0,170,255,0.3);}
#menu .sub{font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:28px;}
#menu .games{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:540px;}
#menu .games .card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:14px 20px;cursor:pointer;transition:0.2s;text-align:center;min-width:108px;pointer-events:auto;}
#menu .games .card:hover{background:rgba(0,170,255,0.12);border-color:#0af;transform:translateY(-2px);}
#menu .games .card .icon{font-size:28px;margin-bottom:4px;}
#menu .games .card .name{font-size:11px;color:rgba(255,255,255,0.6);}
#menu .hint{color:rgba(255,255,255,0.2);font-size:11px;margin-top:20px;}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e1a;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#0af;transition:opacity 0.8s;font-family:'Inter',sans-serif;}
#loading .logo{font-size:64px;margin-bottom:4px;animation:logoPulse 1.5s infinite;}
@keyframes logoPulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
#loading h1{font-size:36px;font-weight:700;letter-spacing:3px;text-shadow:0 0 60px rgba(0,170,255,0.3);}
#loading .sub{font-size:11px;color:rgba(255,255,255,0.25);margin-top:4px;}
#loading .bar{width:340px;height:2px;background:rgba(0,170,255,0.1);border-radius:2px;margin-top:28px;overflow:hidden;}
#loading .bar-inner{width:0%;height:100%;background:linear-gradient(90deg,#0af,#4df);transition:width 0.3s;}
</style>
</head>
<body>
<div id="loading">
  <div class="logo">🔷</div>
  <h1>ROBLOX</h1>
  <div class="sub">Loading experiences...</div>
  <div class="bar"><div class="bar-inner" id="loadBar"></div></div>
</div>
<div id="ui" style="display:none;">
  <div id="topBar">
    <div class="logo">🔷 <span>Roblox</span></div>
    <div class="sep"></div>
    <div class="gameName" id="gameName">Hub</div>
    <div class="stats">
      <span>$<span class="val m" id="moneyDisp">0</span></span>
      <span>❤️ <span class="val" id="hpDisp">100</span></span>
    </div>
  </div>
  <div id="hudCenter"><div class="big" id="hudTitle">HUB</div><div class="sub" id="hudSub">Explore!</div></div>
  <div id="crosshair">+</div>
  <div id="healthBar"><div class="fill" id="healthFill" style="width:100%"></div></div>
  <div id="interact">Press <span class="key">E</span> <span id="interactTxt">to interact</span></div>
  <div id="toast"></div>
</div>
<div id="menu">
  <div class="title">🎮 Choose a Game</div>
  <div class="sub">Click to play</div>
  <div class="games" id="gameList"></div>
  <div class="hint">Press <b>M</b> to open menu &nbsp;·&nbsp; <b>Shift</b> to sprint</div>
</div>
<div id="gameOver">
  <div class="big" id="goTitle">GAME OVER</div>
  <div class="sm" id="goSub"></div>
  <div class="btns">
    <button onclick="showMenu()">Play Again</button>
    <button onclick="showMenu()">Back to Hub</button>
  </div>
</div>
<script>
// ══ CONSTANTS ════════════════════════════════════════════════
const G=-32,MS=14,JF=13;
const _v=new THREE.Vector3();
// ══ STATE ════════════════════════════════════════════════════
let mode='hub',isLocked=false,dt=0,health=100,shakeA=0;
const K={};
const P={x:0,y:3,z:0,vx:0,vy:0,vz:0,onGround:false,yaw:0,pitch:0,money:0};
// ══ SCENE ══════════════════════════════════════════════════════
const S=new THREE.Scene();
S.background=new THREE.Color(0x6ec8ff);
S.fog=new THREE.Fog(0x6ec8ff,70,180);
const C=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,500);
const R=new THREE.WebGLRenderer({antialias:true});
R.setSize(innerWidth,innerHeight);
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.shadowMap.enabled=true;
R.shadowMap.type=THREE.PCFSoftShadowMap;
R.toneMapping=THREE.ACESFilmicToneMapping;
R.toneMappingExposure=1.0;
document.body.prepend(R.domElement);
const A=new THREE.AmbientLight(0x88bbdd,0.45);
S.add(A);
const U=new THREE.DirectionalLight(0xffeedd,1.6);
U.position.set(80,150,60);U.castShadow=true;
U.shadow.mapSize.width=2048;U.shadow.mapSize.height=2048;
U.shadow.camera.near=1;U.shadow.camera.far=300;
U.shadow.camera.left=-150;U.shadow.camera.right=150;
U.shadow.camera.top=150;U.shadow.camera.bottom=-150;
S.add(U);
const H2=new THREE.HemisphereLight(0x87ceeb,0x6b4423,0.35);
S.add(H2);
// ══ HELPERS ══════════════════════════════════════════════════
const RC=new THREE.Raycaster();
function bx(w,h,d,c,o={}){const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:c,roughness:0.4,metalness:0,...o}));m.castShadow=true;m.receiveShadow=true;return m;}
function pl(w,d,c,y=.5){const m=bx(w,.5,d,c);m.position.y=y;return m;}
function cy(r,h,c,o={}){const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,12),new THREE.MeshStandardMaterial({color:c,roughness:0.4,metalness:0,...o}));m.castShadow=true;return m;}
function sp(r,c,o={}){const m=new THREE.Mesh(new THREE.SphereGeometry(r,12,12),new THREE.MeshStandardMaterial({color:c,roughness:0.4,metalness:0,...o}));m.castShadow=true;return m;}
function ct(t,w=128,h=32,c='#fff',s=16){
  const ca=document.createElement('canvas');ca.width=w;ca.height=h;
  const ctx=ca.getContext('2d');
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle=c;ctx.font=`bold ${s}px Inter,monospace`;ctx.textAlign='center';
  ctx.fillText(t,w/2,h-s/3);
  return new THREE.CanvasTexture(ca);
}
function lb(t,c,s=16,w=160){const m=new THREE.Mesh(new THREE.PlaneGeometry(w/40,32/40),new THREE.MeshBasicMaterial({map:ct(t,w,32,c,s),transparent:true,side:THREE.DoubleSide}));return m;}
// ══ CLOUDS ═══════════════════════════════════════════════════
function addClouds(g,cx,cy,cz){
  const cloud=new THREE.Group();
  const rs=[1.6,1.2,1.8,1.0,1.4];
  rs.forEach((r,i)=>{const p=sp(r,0xffffff,{transparent:true,opacity:0.5});p.position.set((i-2)*1.8,Math.sin(i)*0.4,(i%3-1)*0.6);cloud.add(p);});
  cloud.position.set(cx,cy,cz);
  g.add(cloud);
}
// ══ PARTICLES ════════════════════════════════════════════════
let particles=[];
function spawnFire(x,y,z,count){
  for(let i=0;i<count;i++){
    const p=sp(0.15+Math.random()*0.2,0xff4400,{transparent:true,opacity:0.8});
    p.position.set(x+(Math.random()-0.5)*4,y+Math.random()*3,z+(Math.random()-0.5)*4);
    p.userData={vy:2+Math.random()*4,vx:(Math.random()-0.5)*3,vz:(Math.random()-0.5)*3,life:1};
    S.add(p);particles.push(p);
  }
}
function spawnCoin(x,y,z){
  const c=sp(0.3,0xffcc00,{emissive:0xffcc00,emissiveIntensity:0.3});
  c.position.set(x,y+1,z);
  c.userData={vy:6,life:1};
  S.add(c);particles.push(c);
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.userData.vy!==undefined){
      p.userData.vy-=32*dt;
      p.position.y+=p.userData.vy*dt;
      if(p.userData.vx!==undefined){p.position.x+=p.userData.vx*dt;p.position.z+=p.userData.vz*dt;}
      p.userData.life-=dt*1.5;
      p.material.opacity=Math.max(0,p.userData.life);
      p.scale.setScalar(0.5+p.userData.life*0.5);
      if(p.userData.life<=0||p.position.y<0){S.remove(p);particles.splice(i,1);}
    }else{
      p.userData.life=(p.userData.life||1)-dt;
      p.position.y+=p.userData.vy*dt;
      p.material.opacity=Math.max(0,p.userData.life);
      if(p.userData.life<=0){S.remove(p);particles.splice(i,1);}
    }
  }
}
// ══ RAIN ═════════════════════════════════════════════════════
let rainDrops=[];
function spawnRain(count){
  for(let i=0;i<count;i++){
    const r=bx(0.05,1,0.05,0x4488ff,{transparent:true,opacity:0.3});
    r.position.set((Math.random()-0.5)*50,20+Math.random()*10,(Math.random()-0.5)*50);
    S.add(r);rainDrops.push(r);
  }
}
function updateRain(){
  rainDrops.forEach(r=>{r.position.y-=25*dt;if(r.position.y<-2){r.position.y=20+Math.random()*10;r.position.x=(Math.random()-0.5)*50;r.position.z=(Math.random()-0.5)*50;}});
}
// ══ ROBLOX CHARACTER ═════════════════════════════════════════
function makeCharacter(){
  const g=new THREE.Group();
  // Head
  const head=bx(1.2,1.2,1.2,0xffcc99);head.position.y=3.2;g.add(head);
  // Face
  const fc=document.createElement('canvas');fc.width=64;fc.height=64;
  const fx=fc.getContext('2d');
  fx.fillStyle='#ffcc99';fx.fillRect(0,0,64,64);
  fx.fillStyle='#222';fx.beginPath();fx.ellipse(18,26,7,9,0,0,Math.PI*2);fx.fill();
  fx.beginPath();fx.ellipse(46,26,7,9,0,0,Math.PI*2);fx.fill();
  fx.strokeStyle='#222';fx.lineWidth=3;fx.beginPath();fx.arc(32,34,16,0.15,Math.PI-0.15);fx.stroke();
  fx.fillStyle='#222';fx.fillRect(9,12,16,3.5);fx.fillRect(39,12,16,3.5);
  const ft=new THREE.CanvasTexture(fc);
  const face=new THREE.Mesh(new THREE.PlaneGeometry(1,1),new THREE.MeshBasicMaterial({map:ft,transparent:true}));
  face.position.set(0,3.2,.61);g.add(face);
  const back=new THREE.Mesh(new THREE.PlaneGeometry(1,1),new THREE.MeshBasicMaterial({color:0xffcc99}));
  back.position.set(0,3.2,-.61);g.add(back);
  // Torso
  g.add(bx(1.4,1.6,0.8,0x44aa44).translateY(1.8));
  // Arms
  const la=bx(0.4,1.4,0.4,0xffcc99);la.position.set(-1,2.5,0);g.add(la);
  const ra=bx(0.4,1.4,0.4,0xffcc99);ra.position.set(1,2.5,0);g.add(ra);
  // Legs
  const ll=bx(0.5,1.2,0.5,0x224488);ll.position.set(-0.4,0.6,0);g.add(ll);
  const rl=bx(0.5,1.2,0.5,0x224488);rl.position.set(0.4,0.6,0);g.add(rl);
  g.userData={la,ra,ll,rl};
  return g;
}
let character=null;
function spawnCharacter(x,y,z){
  if(character)S.remove(character);
  character=makeCharacter();
  character.position.set(x,y,z);
  S.add(character);
}
function animCharacter(){
  if(!character)return;
  const spd=Math.sqrt(P.vx*P.vx+P.vz*P.vz);
  const t=Date.now()*0.012;
  const sw=spd>0.8?Math.sin(t)*0.5:0;
  if(character.userData.la){character.userData.la.rotation.x=sw;character.userData.ra.rotation.x=-sw;}
  if(character.userData.ll){character.userData.ll.rotation.x=-sw*0.7;character.userData.rl.rotation.x=sw*0.7;}
}
// ══ RAYCAST COLLISION ═══════════════════════════════════════
function getActiveGroup(){
  if(mode==='hub'&&hub)return hub;
  if(mode==='disaster'&&disaster)return disaster;
  if(mode==='obby'&&obby)return obby;
  if(mode==='speedrun'&&speed)return speed;
  if(mode==='tycoon'&&tycoon)return tycoon;
  if(mode==='deathrun'&&dr)return dr;
  if(mode==='simulator'&&am)return am;
  if(mode==='roleplay'&&rp)return rp;
  if(mode==='parkour'&&pk)return pk;
  return null;
}
function checkGround(){
  const grp=getActiveGroup();
  if(!grp)return false;
  _v.set(P.x,P.y+0.5,P.z);
  RC.set(_v,new THREE.Vector3(0,-1,0));
  RC.far=2;
  const ms=[];
  grp.traverse(c=>{if(c.isMesh&&c.geometry.type==='BoxGeometry')ms.push(c);});
  if(ms.length===0)return false;
  const hits=RC.intersectObjects(ms);
  for(const h of hits){
    if(h.distance>0.05&&h.distance<1.8){
      P.y=h.point.y+0.5;P.vy=0;
      return true;
    }
  }
  return false;
}
// ══ HUB ════════════════════════════════════════════════════
let hub=null;
const GAMES=[
  {id:'disaster',name:'🌊 Natural\nDisaster',color:'#44aaff'},
  {id:'obby',name:'🏗️ Tower\nof Hell',color:'#ff6644'},
  {id:'speedrun',name:'⚡ Speed\nRun',color:'#44ff44'},
  {id:'tycoon',name:'🏪 Theme\nPark',color:'#ffcc00'},
  {id:'deathrun',name:'☠️ Death\nRun',color:'#ff4444'},
  {id:'simulator',name:'🐾 Adopt\nMe!',color:'#ff88ff'},
  {id:'roleplay',name:'🏘️ Role\nPlay',color:'#4488ff'},
  {id:'parkour',name:'🧗 Park\nour',color:'#44ffcc'},
];
function buildHub(){
  const g=new THREE.Group();
  // Terrain with subtle height
  const terrain=new THREE.Mesh(new THREE.PlaneGeometry(200,200,16,16).rotateX(-Math.PI/2),new THREE.MeshStandardMaterial({color:0x6da83a,roughness:0.6,metalness:0}));
  terrain.receiveShadow=true;g.add(terrain);
  // Path tiles
  const pathMat=new THREE.MeshStandardMaterial({color:0xc49a6c,roughness:0.8});
  for(let i=-3;i<=3;i++){const p=new THREE.Mesh(new THREE.PlaneGeometry(2,1.5).rotateX(-Math.PI/2),pathMat);p.position.set(i*8,0.1,0);g.add(p);}
  for(let i=-3;i<=3;i++){const p=new THREE.Mesh(new THREE.PlaneGeometry(1.5,2).rotateX(-Math.PI/2),pathMat);p.position.set(0,0.1,i*8);g.add(p);}
  // Spawn platform
  const spPl=new THREE.Mesh(new THREE.CylinderGeometry(8,8,1.5,24),new THREE.MeshStandardMaterial({color:0xdddddd,roughness:0.5}));
  spPl.position.y=0.75;spPl.receiveShadow=true;spPl.castShadow=true;g.add(spPl);
  // Orb
  const orb=sp(2,0x0af,{roughness:0.1,metalness:0.3,emissive:0x0af,emissiveIntensity:0.15});
  orb.position.y=6;g.add(orb);
  // Clouds
  for(let i=0;i<8;i++){const a=Math.random()*Math.PI*2,r=12+Math.random()*10;addClouds(g,Math.sin(a)*r,12+Math.random()*3,Math.cos(a)*r);}
  // Trees around perimeter
  const treeColors=[0x44aa44,0x55bb55,0x338833];
  for(let i=0;i<20;i++){
    const a=Math.random()*Math.PI*2,r=20+Math.random()*15;
    const tr=cy(0.3,3,0x8b5a2b);tr.position.set(Math.sin(a)*r,1.5,Math.cos(a)*r);g.add(tr);
    const lf=sp(1.2+Math.random()*0.8,treeColors[i%3]);lf.position.set(Math.sin(a)*r,4+Math.random()*0.5,Math.cos(a)*r);g.add(lf);
  }
  // Flowers / grass tufts
  for(let i=0;i<40;i++){
    const a=Math.random()*Math.PI*2,r=10+Math.random()*30;
    const fl=sp(0.1,0xff4488,{transparent:true,opacity:0.6});fl.position.set(Math.sin(a)*r,0.1,Math.cos(a)*r);fl.scale.y=0.3;g.add(fl);
  }
  // Game posts
  g.userData.portals=[];
  GAMES.forEach((gm,i)=>{
    const a=i/GAMES.length*Math.PI*2;
    const r=16,px=Math.sin(a)*r,pz=-Math.cos(a)*r;
    const post=cy(0.3,3,0xaaaaaa);post.position.set(px,1.5,pz);g.add(post);
    const sign=bx(3.5,2,0.2,0xffffff);sign.position.set(px,3.5,pz);g.add(sign);
    const stripe=bx(3.5,0.15,0.21,parseInt(gm.color.replace('#',''),16));stripe.position.set(px,4.3,pz);g.add(stripe);
    const lbl=lb(gm.name.replace('\n',' '),gm.color,13,200);lbl.position.set(px,3.4,pz);g.add(lbl);
    g.userData.portals.push({x:px,y:2.5,z:pz,game:gm.id,color:gm.color});
  });
  // Welcome signs
  const wl=lb('🔷 Welcome to Roblox!','#ffffff',18,300);wl.position.set(0,6,14);g.add(wl);
  const sl=lb('Walk to a sign & press E to play','rgba(255,255,255,0.4)',11,300);sl.position.set(0,4.8,14);g.add(sl);
  g.userData.spawn={x:0,y:2,z:16};
  return g;
}
function initHub(){
  clearAll();hub=buildHub();S.add(hub);
  const sp=hub.userData.spawn;P.x=sp.x;P.y=sp.y;P.z=sp.z;P.vx=P.vy=P.vz=0;
  mode='hub';
  document.getElementById('gameName').textContent='Hub';
  setHud('🔷 Roblox','Explore games & earn money!');
  document.getElementById('gameOver').style.display='none';
  document.getElementById('menu').style.display='none';
  spawnCharacter(P.x,P.y,P.z);

function updateDisaster(){
  if(!disaster||!disAlive)return;
  disTimer+=dt;
  if(disTimer>4&&disActive){
    disActive=false;disTimer=0;
    const type=Math.floor(Math.random()*3);
    if(type===0){ // Earthquake
      setHud('🌍 EARTHQUAKE!','Buildings shaking!');shakeA=0.3;
      disaster.children.forEach(c=>{if(c.geometry&&c.geometry.type==='BoxGeometry'){c.position.x+=(Math.random()-0.5)*1.5;c.position.z+=(Math.random()-0.5)*1.5;}});
    }else if(type===1){ // Fire rain
      setHud('🔥 FIRE RAIN!','Run!');spawnFire(0,8,0,15);
    }else{ // Flood
      setHud('🌊 FLOOD!','Water rising!');spawnRain(80);
      const fl=new THREE.Mesh(new THREE.PlaneGeometry(80,80).rotateX(-Math.PI/2),new THREE.MeshBasicMaterial({color:0x4488cc,transparent:true,opacity:0.3}));
      fl.position.y=0;fl.name='flood';S.add(fl);
    }
    setTimeout(()=>{disActive=true;disScore++;document.getElementById('hudTitle').textContent=`Survived ${disScore} rounds!`;},2500);
  }
  // Building damage from earthquake
  if(shakeA>0&&disaster){
    disaster.children.forEach(c=>{if(c.geometry&&c.geometry.type==='BoxGeometry'&&c.position.y>2){c.position.x+=Math.sin(Date.now()*0.01+c.id)*shakeA*0.05;c.position.z+=Math.cos(Date.now()*0.013+c.id)*shakeA*0.05;}});
    shakeA*=0.98;
  }
  if(P.y<-10){disAlive=false;endGame('GAME OVER','You fell into the water!',disScore*50);}

  document.getElementById('hudSub').textContent=`Height: ${P.y.toFixed(1)}m | Platform: ${Math.min(25,Math.floor(-P.x/7)+1)}/25`;
}
// ══ GAME MANAGEMENT ══════════════════════════════════════════
function clearAll(){
  // Remove particle leftovers
  particles.forEach(p=>{try{S.remove(p)}catch(e){}});particles=[];
  rainDrops.forEach(r=>{try{S.remove(r)}catch(e){}});rainDrops=[];
  // Remove flood planes
  S.children.filter(c=>c.name==='flood').forEach(c=>S.remove(c));
  [hub,obby,disaster,speed,tycoon,dr,am,rp,pk].forEach(g=>{try{if(g)S.remove(g)}catch(e){}});
  if(character)S.remove(character);
  amPets.forEach(p=>{try{if(!p.col)S.remove(p.m);S.remove(p.eye1);S.remove(p.eye2)}catch(e){}});amPets=[];
  hub=obby=disaster=speed=tycoon=dr=am=rp=pk=null;
  interactTarget=null;
}
function setHud(t,s){document.getElementById('hudTitle').textContent=t;document.getElementById('hudSub').textContent=s;}
function endGame(t,s,m){
  P.money+=m||0;
  document.getElementById('goTitle').textContent=t;
  document.getElementById('goSub').innerHTML=s+(m?`<br>+$${m}`:'');
  document.getElementById('gameOver').style.display='flex';
  if(m)spawnCoin(P.x,P.y+2,P.z);
}
function showMenu(){
  document.getElementById('gameOver').style.display='none';
  document.getElementById('menu').style.display='flex';
  document.getElementById('hudTitle').textContent='MENU';
}
function playGame(id){
  document.getElementById('menu').style.display='none';
  document.body.click();
  switch(id){
    case 'disaster':initDisaster();break;
    case 'obby':initObby();break;
    case 'speedrun':initSpeed();break;
    case 'tycoon':initTycoon();break;
    case 'deathrun':initDR();break;
    case 'simulator':initAM();break;
    case 'roleplay':initRP();break;
    case 'parkour':initPK();break;
    default:initHub();
  }
}
// ══ PLAYER ══════════════════════════════════════════════════
function updatePlayer(){
  let mx=0,mz=0;
  if(K['w']||K['arrowup'])mz-=1;
  if(K['s']||K['arrowdown'])mz+=1;
  if(K['a']||K['arrowleft'])mx-=1;
  if(K['d']||K['arrowright'])mx+=1;
  const l=Math.sqrt(mx*mx+mz*mz);
  if(l>0){mx/=l;mz/=l;}
  const spd=K['shift']?MS*1.5:MS;
  const rm=mx*Math.cos(P.yaw)-mz*Math.sin(P.yaw);
  const rz=mx*Math.sin(P.yaw)+mz*Math.cos(P.yaw);
  P.vx=rm*spd;
  P.vz=rz*spd;
  P.vy+=G*dt;
  // Apply movement
  P.x+=P.vx*dt;
  P.z+=P.vz*dt;
  // Ground collision via raycast
  const onG=checkGround();
  if(onG){
    P.onGround=true;
    P.vy=0;
  }else{
    P.y+=P.vy*dt;
    if(P.y<-15){P.y=-15;P.vy=0;}
    P.onGround=false;
  }
  // Jump
  if((K[' ']||K['space'])&&P.onGround&&isLocked){P.vy=JF;P.onGround=false;K[' ']=false;K['space']=false;}
  // Screen shake
  if(shakeA>0){
    C.position.x+=Math.sin(Date.now()*0.05)*shakeA*0.3;
    C.position.y+=Math.cos(Date.now()*0.07)*shakeA*0.2;
    shakeA*=0.97;
    if(shakeA<0.001)shakeA=0;
  }
}
// ══ CAMERA ══════════════════════════════════════════════════
function updateCam(){
  C.position.set(P.x,P.y+1.6,P.z);
  C.quaternion.setFromEuler(new THREE.Euler(P.pitch,P.yaw,0,'YXZ'));
}
// ══ INTERACT ═══════════════════════════════════════════════
let interactTarget=null;
function checkInteract(){
  const ie=document.getElementById('interact');
  interactTarget=null;
  document.getElementById('interactTxt').textContent='to interact';
  if(mode==='hub'&&hub){
    RC.setFromCamera({x:0,y:0},C);
    const hits=RC.intersectObjects(hub.children,true);
    let found=null;
    for(const h2 of hits){
      for(const p of hub.userData.portals||[]){
        if(Math.sqrt((h2.point.x-p.x)**2+(h2.point.z-p.z)**2)<6&&Math.abs(h2.point.y-p.y)<5){found=p;break;}
      }if(found)break;
    }
    if(found){
      ie.style.display='block';ie.style.animation='none';
      document.getElementById('interactTxt').textContent=`Press E to play ${found.game.toUpperCase()}`;
      if(K['e']){K['e']=false;playGame(found.game);}
    }else{ie.style.display='none';}
  }else if(mode==='tycoon'&&tycoon){
    RC.setFromCamera({x:0,y:0},C);
    const hits=RC.intersectObjects(tycoon.children);
    let found=null;
    for(const h2 of hits){
      for(const s of tycoon.userData.rides||[]){
        if(Math.abs(h2.object.position.x-s.x)<3&&Math.abs(h2.object.position.z-s.z)<3&&!s.owned&&P.money>=s.cost){found=s;break;}
      }if(found)break;
    }
    if(found){
      ie.style.display='block';
      document.getElementById('interactTxt').textContent=`Press E to buy ${found.name} - $${found.cost.toLocaleString()}`;
      interactTarget={type:'tycoon_ride',idx:found.i};
      if(K['e']){K['e']=false;P.money-=found.cost;found.owned=true;
        tycoon.children.forEach(c=>{if(c.position.x===found.x&&c.position.z===found.z&&c.geometry&&c.geometry.type==='BoxGeometry'&&c.position.y===.75)c.material.color.setHex(0x44aa44);});
        spawnCoin(found.x,3,found.z);
        ie.style.display='none';
      }
    }else{ie.style.display='none';}
  }else{ie.style.display='none';}
}
// ══ CONTROLS ════════════════════════════════════════════════
document.addEventListener('keydown',e=>{K[e.key.toLowerCase()]=true;if(e.key===' '&&isLocked)e.preventDefault();if(e.key==='Escape'&&isLocked)document.exitPointerLock();if(e.key==='m'||e.key==='M')showMenu();});
document.addEventListener('keyup',e=>{K[e.key.toLowerCase()]=false;});
R.domElement.addEventListener('click',()=>{if(!isLocked&&document.getElementById('menu').style.display!=='flex')R.domElement.requestPointerLock();});
document.addEventListener('pointerlockchange',()=>{isLocked=!!document.pointerLockElement;});
document.addEventListener('mousemove',e=>{if(!isLocked)return;P.yaw-=e.movementX*0.003;P.pitch-=e.movementY*0.003;P.pitch=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,P.pitch));});
// ══ UI ══════════════════════════════════════════════════════
(function(){
  const gl=document.getElementById('gameList');
  GAMES.forEach(g=>{
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`<div class="icon">${g.name.split('\n')[0]}</div><div class="name">${g.name.replace('\n',' ')}</div>`;
    card.addEventListener('click',()=>playGame(g.id));
    gl.appendChild(card);
  });
})();
// ══ MAIN ════════════════════════════════════════════════════
let fc=0,fl=0,lt=0;
function anim(t){
  requestAnimationFrame(anim);
  dt=Math.min((t-(lt||t))/1000,0.05);lt=t;
  updatePlayer();updateCam();animCharacter();updateParticles();
  switch(mode){
    case 'disaster':updateDisaster();updateRain();break;
    case 'obby':updateObby();break;
    case 'speedrun':updateSpeed();break;
    case 'tycoon':updateTycoon();break;
    case 'deathrun':updateDR();break;
    case 'simulator':updateAM();break;
    case 'roleplay':updateRP();break;
    case 'parkour':updatePK();break;
  }
  if(character)character.position.set(P.x,P.y,P.z);
  document.getElementById('moneyDisp').textContent=Math.floor(P.money).toLocaleString();
  checkInteract();
  R.render(S,C);
  fc++;
  if(t-fl>1000){fc=0;fl=t;}
}
// ══ RESIZE ════════════════════════════════════════════════════
window.addEventListener('resize',()=>{C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);});
// ══ LOAD ═════════════════════════════════════════════════════
let lp=0;
const li=setInterval(()=>{
  lp+=Math.random()*15+5;
  if(lp>=100){lp=100;clearInterval(li);
    document.getElementById('loadBar').style.width='100%';
    setTimeout(()=>{document.getElementById('loading').style.opacity='0';
      setTimeout(()=>{document.getElementById('loading').style.display='none';
        document.getElementById('ui').style.display='block';
        initHub();anim(0);},800);},400);
  }
  document.getElementById('loadBar').style.width=lp+'%';
},150);
</script>
