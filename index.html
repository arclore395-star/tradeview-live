<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BlockWorld — Build & Explore</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:'Inter','Segoe UI',sans-serif;overflow:hidden;user-select:none;}
canvas{display:block;}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;}
#crosshair{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:24px;color:rgba(255,255,255,0.4);
  pointer-events:none;text-shadow:0 0 4px rgba(0,0,0,0.5);
}
#toolbar{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:4px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
  padding:6px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);
  pointer-events:auto;
}
#toolbar .slot{
  width:44px;height:44px;border:2px solid rgba(255,255,255,0.1);border-radius:6px;
  cursor:pointer;transition:0.15s;position:relative;
}
#toolbar .slot:hover{border-color:rgba(255,255,255,0.3);}
#toolbar .slot.active{border-color:#0af;background:rgba(0,170,255,0.15);}
#toolbar .slot .swatch{width:28px;height:28px;border-radius:4px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
#info{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.5);font-size:12px;text-align:center;
  background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);
  padding:6px 14px;border-radius:6px;border:1px solid rgba(255,255,255,0.05);
  pointer-events:none;
}
#stats{
  position:absolute;top:12px;right:12px;
  color:rgba(255,255,255,0.4);font-size:11px;font-family:monospace;
  background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);
  padding:6px 10px;border-radius:6px;
  pointer-events:none;text-align:right;line-height:1.6;
}
#loading{
  position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e1a;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#0af;font-family:'Inter',sans-serif;transition:opacity 0.8s;
}
#loading h1{font-size:42px;font-weight:300;letter-spacing:4px;text-shadow:0 0 40px rgba(0,170,255,0.3);}
#loading .sub{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:6px;text-transform:uppercase;margin-top:4px;}
#loading .bar{width:320px;height:2px;background:rgba(0,170,255,0.1);border-radius:2px;margin-top:24px;overflow:hidden;}
#loading .bar-inner{width:0%;height:100%;background:#0af;transition:width 0.3s;border-radius:2px;}
@media(max-width:700px){
  #toolbar .slot{width:36px;height:36px;}
  #toolbar .slot .swatch{width:22px;height:22px;}
  #stats{font-size:10px;}
}
</style>
</head>
<body>
<div id="loading">
  <h1>BLOCKWORLD</h1>
  <div class="sub">Build & Explore</div>
  <div class="bar"><div class="bar-inner" id="loadBar"></div></div>
</div>
<div id="ui" style="display:none;">
  <div id="info">WASD Move · Space Jump · Mouse Look · Click Place · Shift+Click Remove · 1-5 Select Block</div>
  <div id="stats">FPS: --</div>
  <div id="crosshair">+</div>
  <div id="toolbar"></div>
</div>
<script>
// ══ BLOCK TYPES ═══════════════════════════════════════════════
const BLOCK_TYPES=[
  {name:'Grass',color:0x5da130},
  {name:'Dirt',color:0x8b5a2b},
  {name:'Stone',color:0x808080},
  {name:'Wood',color:0xc4883c},
  {name:'Brick',color:0xb84444},
  {name:'Water',color:0x4488cc},
  {name:'Gold',color:0xffaa00},
  {name:'Snow',color:0xe8e8f0},
];
let selectedBlock=0;
const BLOCK_SIZE=4;

// ══ SCENE ══════════════════════════════════════════════════════
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x7ec8e3);
scene.fog=new THREE.Fog(0x7ec8e3,200,500);

const cam=new THREE.PerspectiveCamera(70,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.0;
document.body.prepend(renderer.domElement);

const amb=new THREE.AmbientLight(0x99bbdd,0.4);
scene.add(amb);
const sun=new THREE.DirectionalLight(0xffeedd,1.5);
sun.position.set(100,200,80);
sun.castShadow=true;
sun.shadow.mapSize.width=2048;sun.shadow.mapSize.height=2048;
sun.shadow.camera.near=1;sun.shadow.camera.far=400;
sun.shadow.camera.left=-200;sun.shadow.camera.right=200;
sun.shadow.camera.top=200;sun.shadow.camera.bottom=-200;
scene.add(sun);
const hemi=new THREE.HemisphereLight(0x87ceeb,0x6b4423,0.5);
scene.add(hemi);

// ══ TERRAIN (flat grass with hills) ═══════════════════════════
const T_SIZE=300,T_SEG=80;
function buildTerrain(){
  const geo=new THREE.PlaneGeometry(T_SIZE,T_SIZE,T_SEG,T_SEG);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position;
  const cols=new Float32Array(pos.count*3);
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i);
    const h=Math.sin(x*0.02)*Math.cos(z*0.025)*3
      +Math.sin(x*0.05+z*0.04)*1.5
      +Math.cos(x*0.08-z*0.06)*0.8;
    const rh=Math.max(h,-2);
    pos.setY(i,rh);
    let r,g,b;
    if(rh<-0.5){
      r=0.2;g=0.25;b=0.15;
    }else if(rh<4){
      const t=(rh+0.5)/4.5;
      r=0.2+t*0.25;g=0.35+t*0.3;b=0.07;
    }else{
      r=0.45;g=0.55;b=0.15;
    }
    cols[i*3]=r;cols[i*3+1]=g;cols[i*3+2]=b;
  }
  geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  geo.computeVertexNormals();
  const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({
    vertexColors:true,roughness:0.85,metalness:0.0
  }));
  mesh.receiveShadow=true;
  scene.add(mesh);
  return mesh;
}
buildTerrain();

function getTerrainHeight(x,z){
  return Math.max(
    Math.sin(x*0.02)*Math.cos(z*0.025)*3
    +Math.sin(x*0.05+z*0.04)*1.5
    +Math.cos(x*0.08-z*0.06)*0.8
  ,-2);
}

// ══ WATER ═════════════════════════════════════════════════════
const water=new THREE.Mesh(
  new THREE.PlaneGeometry(600,600).rotateX(-Math.PI/2),
  new THREE.MeshPhysicalMaterial({
    color:0x4488cc,transparent:true,opacity:0.6,
    roughness:0.05,metalness:0.0,clearcoat:0.2
  })
);
water.position.set(0,-1,0);
scene.add(water);

// ══ BLOCKS (chunk management) ════════════════════════════════
const blocks=new Map(); // key: "x,y,z"
const placedMeshes=new Map();
const blockGeo=new THREE.BoxGeometry(BLOCK_SIZE,BLOCK_SIZE,BLOCK_SIZE);
const tempBlockGeo=new THREE.BoxGeometry(BLOCK_SIZE*1.01,BLOCK_SIZE*1.01,BLOCK_SIZE*1.01);

function blockKey(x,y,z){return Math.round(x)+','+Math.round(y)+','+Math.round(z);}

function placeBlock(x,y,z,type){
  const key=blockKey(x,y,z);
  if(blocks.has(key))return;
  blocks.set(key,type);
  const mat=new THREE.MeshStandardMaterial({
    color:BLOCK_TYPES[type].color,
    roughness:0.6,metalness:type===6?0.5:0
  });
  const mesh=new THREE.Mesh(blockGeo,mat);
  mesh.position.set(x*BLOCK_SIZE,y*BLOCK_SIZE+BLOCK_SIZE/2,z*BLOCK_SIZE);
  mesh.castShadow=true;mesh.receiveShadow=true;
  scene.add(mesh);
  placedMeshes.set(key,mesh);
}

function removeBlock(x,y,z){
  const key=blockKey(x,y,z);
  if(!blocks.has(key))return;
  const mesh=placedMeshes.get(key);
  if(mesh){scene.remove(mesh);}
  blocks.delete(key);
  placedMeshes.delete(key);
}

// Ground layer
for(let x=-40;x<=40;x++){
  for(let z=-40;z<=40;z++){
    const h=Math.round(getTerrainHeight(x*BLOCK_SIZE,z*BLOCK_SIZE)/BLOCK_SIZE);
    placeBlock(x,0,z,0);
    if(Math.random()<0.3&&h>0){
      placeBlock(x,h,z,1);
    }
    // Water blocks
    if(h<0&&Math.random()<0.5){
      placeBlock(x,-1,z,5);
    }
  }
}

// Pre-build structures
// House
const houseX=15,houseZ=10;
for(let x=0;x<6;x++)for(let z=0;z<5;z++){
  placeBlock(houseX+x,1,houseZ+z,3);
  if(x===0||x===5||z===0||z===4){
    for(let y=2;y<5;y++)placeBlock(houseX+x,y,houseZ+z,3);
  }
}
// Roof (red brick)
for(let x=-1;x<7;x++)for(let z=-1;z<6;z++){
  placeBlock(houseX+x,5,houseZ+z,4);
  placeBlock(houseX+x,6,houseZ+z,4);
}
// Door
placeBlock(houseX+3,1,houseZ+4,7);

// Tower
const towerX=-20,towerZ=15;
for(let x=0;x<4;x++)for(let z=0;z<4;z++){
  for(let y=1;y<12;y++){
    if(x>0&&x<3&&z>0&&z<3&&y<11)continue;
    placeBlock(towerX+x,y,towerZ+z,2);
  }
}

// Trees
function makeTree(bx,bz){
  const hh=Math.round(getTerrainHeight(bx*BLOCK_SIZE,bz*BLOCK_SIZE)/BLOCK_SIZE)+1;
  const trunkH=2+Math.random()*2|0;
  for(let y=0;y<trunkH;y++)placeBlock(bx,hh+y,bz,3);
  const crown=2+(Math.random()*2|0);
  for(let dx=-crown;dx<=crown;dx++)for(let dz=-crown;dz<=crown;dz++){
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist>crown+0.5)continue;
    const cy=hh+trunkH-1+Math.round((1-dist/(crown+1))*crown);
    const h2=getTerrainHeight((bx+dx)*BLOCK_SIZE,(bz+dz)*BLOCK_SIZE);
    placeBlock(bx+dx,cy,bz+dz,0);
  }
}
for(let i=0;i<50;i++){
  const bx=-30+Math.random()*60|0,bz=-30+Math.random()*60|0;
  if(Math.abs(bx)<4&&Math.abs(bz)<4)continue;
  if(Math.abs(bx-houseX)<8&&Math.abs(bz-houseZ)<8)continue;
  if(Math.abs(bx-towerX)<6&&Math.abs(bz-towerZ)<6)continue;
  makeTree(bx,bz);
}

// Bridge
const brX=5,brZ=-25;
for(let x=0;x<8;x++){
  for(let z=0;z<3;z++){
    placeBlock(brX+x,1,brZ+z,2);
    if((x===0||x===7)){
      for(let y=2;y<4;y++)placeBlock(brX+x,y,brZ+z,2);
    }
  }
}

// ══ CHARACTER ═════════════════════════════════════════════════
const charGroup=new THREE.Group();
const bodyMat=new THREE.MeshStandardMaterial({color:0x44aa44,roughness:0.5});
const headMat=new THREE.MeshStandardMaterial({color:0xffcc99,roughness:0.5});
const limbMat=new THREE.MeshStandardMaterial({color:0x3366cc,roughness:0.5});
const eyeMat=new THREE.MeshBasicMaterial({color:0x222222});

// Body
const body=new THREE.Mesh(new THREE.BoxGeometry(1.2,1.6,0.8),bodyMat);
body.position.y=1.2;
charGroup.add(body);

// Head
const head=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),headMat);
head.position.y=2.2;
charGroup.add(head);

// Eyes
for(let side of[-1,1]){
  const eye=new THREE.Mesh(new THREE.BoxGeometry(0.15,0.15,0.1),eyeMat);
  eye.position.set(side*0.25,2.3,0.5);
  charGroup.add(eye);
}

// Arms
for(let side of[-1,1]){
  const arm=new THREE.Mesh(new THREE.BoxGeometry(0.3,1.2,0.3),limbMat);
  arm.position.set(side*0.8,1.4,0);
  arm.rotation.z=side*0.15;
  charGroup.add(arm);
}

// Legs
for(let side of[-1,1]){
  const leg=new THREE.Mesh(new THREE.BoxGeometry(0.35,1,0.35),new THREE.MeshStandardMaterial({color:0x224488,roughness:0.5}));
  leg.position.set(side*0.3,0.5,0);
  charGroup.add(leg);
}

charGroup.position.set(0,2,0);
scene.add(charGroup);

// Character physics
const charState={
  x:0,z:0,y:2,
  vx:0,vz:0,vy:0,
  onGround:false,
  speed:12,jumpForce:10,
};

// ══ CAMERA CONTROL (third person orbit) ══════════════════════
let camTheta=0,camPhi=0.5,camDist=10;
let isPointerLocked=false;
let mouseDown=false,lastMX=0,lastMY=0;

// ══ BLOCK TARGETING ══════════════════════════════════════════
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function getBlockAt(x,y,z){
  return blocks.get(blockKey(x,y,z));
}

// Highlight mesh for targeted block
const highlightMat=new THREE.MeshBasicMaterial({
  color:0xffffff,transparent:true,opacity:0.2,wireframe:true
});
let highlightMesh=null;

function updateTargeting(){
  if(!isPointerLocked){
    if(highlightMesh){scene.remove(highlightMesh);highlightMesh=null;}
    return;
  }
  raycaster.setFromCamera({x:0,y:0},cam);
  const allMeshes=[];
  placedMeshes.forEach(m=>allMeshes.push(m));
  const hits=raycaster.intersectObjects(allMeshes);
  if(hits.length>0){
    const hit=hits[0];
    const pos=hit.object.position;
    const bx=Math.round(pos.x/BLOCK_SIZE);
    const by=Math.round((pos.y-BLOCK_SIZE/2)/BLOCK_SIZE);
    const bz=Math.round(pos.z/BLOCK_SIZE);
    const normal=hit.face.normal;
    // For build mode, show the adjacent block position
    const nx=bx+Math.round(normal.x);
    const ny=by+Math.round(normal.y);
    const nz=bz+Math.round(normal.z);
    if(!highlightMesh){
      highlightMesh=new THREE.Mesh(tempBlockGeo,highlightMat);
      scene.add(highlightMesh);
    }
    highlightMesh.position.set(nx*BLOCK_SIZE,ny*BLOCK_SIZE+BLOCK_SIZE/2,nz*BLOCK_SIZE);
  }else{
    if(highlightMesh){scene.remove(highlightMesh);highlightMesh=null;}
  }
}

// ══ PLAYER CONTROLS ══════════════════════════════════════════
const keys={};

document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '&&isPointerLocked){e.preventDefault();}
  // Number keys for block selection
  const n=parseInt(e.key);
  if(n>=1&&n<=5&&isPointerLocked){
    selectedBlock=n-1;
    document.querySelectorAll('#toolbar .slot').forEach((s,i)=>s.classList.toggle('active',i===selectedBlock));
  }
});

document.addEventListener('keyup',e=>{
  keys[e.key.toLowerCase()]=false;
});

function updateCharacter(dt){
  const cs=charState;
  let mx=0,mz=0;
  if(keys['w']||keys['arrowup'])mz-=1;
  if(keys['s']||keys['arrowdown'])mz+=1;
  if(keys['a']||keys['arrowleft'])mx-=1;
  if(keys['d']||keys['arrowright'])mx+=1;

  const len=Math.sqrt(mx*mx+mz*mz);
  if(len>0){mx/=len;mz/=len;}

  const fwd=camTheta;
  const rmx=mx*Math.cos(fwd)-mz*Math.sin(fwd);
  const rmz=mx*Math.sin(fwd)+mz*Math.cos(fwd);

  const targetVx=rmx*cs.speed;
  const targetVz=rmz*cs.speed;
  cs.vx+=(targetVx-cs.vx)*dt*10;
  cs.vz+=(targetVz-cs.vz)*dt*10;

  // Gravity
  cs.vy-=25*dt;
  cs.y+=cs.vy*dt;

  const newX=cs.x+cs.vx*dt;
  const newZ=cs.z+cs.vz*dt;

  // Ground collision
  const gnd=getTerrainHeight(newX,newZ)+2;
  if(cs.y<gnd){
    cs.y=gnd;
    cs.vy=0;
    cs.onGround=true;
  }else{
    cs.onGround=false;
  }

  // Jump
  if((keys[' ']||keys['space'])&&cs.onGround&&isPointerLocked){
    cs.vy=cs.jumpForce;
    cs.onGround=false;
  }

  cs.x=newX;
  cs.z=newZ;

  charGroup.position.set(cs.x,cs.y,cs.z);

  // Face movement direction
  if(rmx!==0||rmz!==0){
    const targetRot=Math.atan2(rmx,rmz);
    let diff=targetRot-charGroup.rotation.y;
    if(diff>Math.PI)diff-=Math.PI*2;
    if(diff<-Math.PI)diff+=Math.PI*2;
    charGroup.rotation.y+=diff*dt*8;
  }
}

// ══ MOUSE / POINTER LOCK ════════════════════════════════════
renderer.domElement.addEventListener('click',()=>{
  if(!isPointerLocked){
    renderer.domElement.requestPointerLock();
  }
});

document.addEventListener('pointerlockchange',()=>{
  isPointerLocked=!!document.pointerLockElement;
  document.getElementById('info').style.opacity=isPointerLocked?'0':'1';
});

document.addEventListener('mousemove',e=>{
  if(!isPointerLocked)return;
  camTheta-=e.movementX*0.005;
  camPhi+=e.movementY*0.005;
  camPhi=Math.max(0.1,Math.min(Math.PI/2-0.1,camPhi));
});

// Block placement
document.addEventListener('mousedown',e=>{
  if(!isPointerLocked)return;
  if(e.button===2||e.shiftKey){
    // Remove: raycast and remove block
    raycaster.setFromCamera({x:0,y:0},cam);
    const allMeshes=[];
    placedMeshes.forEach(m=>allMeshes.push(m));
    const hits=raycaster.intersectObjects(allMeshes);
    if(hits.length>0){
      const hit=hits[0];
      const bx=Math.round(hit.object.position.x/BLOCK_SIZE);
      const by=Math.round((hit.object.position.y-BLOCK_SIZE/2)/BLOCK_SIZE);
      const bz=Math.round(hit.object.position.z/BLOCK_SIZE);
      removeBlock(bx,by,bz);
    }
  }else{
    // Place: raycast and place adjacent
    raycaster.setFromCamera({x:0,y:0},cam);
    const allMeshes=[];
    placedMeshes.forEach(m=>allMeshes.push(m));
    const hits=raycaster.intersectObjects(allMeshes);
    if(hits.length>0){
      const hit=hits[0];
      const bx=Math.round(hit.object.position.x/BLOCK_SIZE);
      const by=Math.round((hit.object.position.y-BLOCK_SIZE/2)/BLOCK_SIZE);
      const bz=Math.round(hit.object.position.z/BLOCK_SIZE);
      const n=hit.face.normal;
      const nx=bx+Math.round(n.x);
      const ny=by+Math.round(n.y);
      const nz=bz+Math.round(n.z);
      placeBlock(nx,ny,nz,selectedBlock);
    }
  }
});

document.addEventListener('contextmenu',e=>e.preventDefault());

// ══ BUILD UI ═════════════════════════════════════════════════
(function buildToolbar(){
  const tb=document.getElementById('toolbar');
  for(let i=0;i<5;i++){
    const slot=document.createElement('div');
    slot.className='slot'+(i===0?' active':'');
    const swatch=document.createElement('div');
    swatch.className='swatch';
    swatch.style.background='#'+BLOCK_TYPES[i].color.toString(16).padStart(6,'0');
    slot.appendChild(swatch);
    slot.title=BLOCK_TYPES[i].name;
    slot.dataset.index=i;
    slot.addEventListener('click',()=>{
      document.querySelectorAll('#toolbar .slot').forEach(s=>s.classList.remove('active'));
      slot.classList.add('active');
      selectedBlock=i;
    });
    tb.appendChild(slot);
  }
})();

// ══ GAME LOOP ════════════════════════════════════════════════
let lastTime=0,frames=0,fpsTime=0;

function animate(time){
  requestAnimationFrame(animate);
  const dt=Math.min((time-lastTime)/1000,0.05);
  lastTime=time;

  updateCharacter(dt);

  // Camera
  const cx=charState.x+Math.sin(camTheta)*camDist*Math.cos(camPhi);
  const cy=charState.y+2+camDist*Math.sin(camPhi);
  const cz=charState.z+Math.cos(camTheta)*camDist*Math.cos(camPhi);
  cam.position.set(cx,cy,cz);
  cam.lookAt(charState.x,charState.y+1.5,charState.z);

  updateTargeting();

  // Animate water
  water.position.y=-1+Math.sin(time*0.001)*0.3;

  // Fog
  scene.fog.far=400+Math.sin(time*0.0005)*50;

  renderer.render(scene,cam);

  // FPS
  frames++;
  if(time-fpsTime>1000){
    document.getElementById('stats').innerHTML=
      `FPS: ${frames}<br>Blocks: ${blocks.size}<br>Pos: ${charState.x.toFixed(0)}, ${charState.z.toFixed(0)}`;
    frames=0;fpsTime=time;
  }
}

// ══ RESIZE ════════════════════════════════════════════════════
window.addEventListener('resize',()=>{
  cam.aspect=window.innerWidth/window.innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ══ LOADING ═══════════════════════════════════════════════════
let lp=0;
const li=setInterval(()=>{
  lp+=Math.random()*15+5;
  if(lp>=100){
    lp=100;clearInterval(li);
    document.getElementById('loadBar').style.width='100%';
    setTimeout(()=>{
      const l=document.getElementById('loading');
      l.style.opacity='0';
      setTimeout(()=>{l.style.display='none';document.getElementById('ui').style.display='block';document.getElementById('info').style.opacity='1';},800);
    },400);
  }
  document.getElementById('loadBar').style.width=lp+'%';
},150);

animate(0);
</script>
</body>
</html>
